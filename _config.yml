# ==========================================
# Site Settings - AI360TRADING GLOBAL
# Updated: April 2026
# ==========================================

name: "AI360Trading"
title: "AI360Trading | NIFTY, S&P 500 & Global Market Intelligence"
description: "Daily AI-powered market intelligence for NIFTY, S&P 500, FTSE 100 and IBOVESPA. Swing and positional trading signals for traders in India, US, UK and Brazil."
url: "https://ai360trading.in"
enforce_ssl: ai360trading.in
baseurl: ""
timezone: "Asia/Kolkata"
future: true
encoding: "utf-8"

# SEO & Ownership
google_site_verification: "2yLD14QlM9ElbyiFZO_pUf-hTO09aCQEinK5LqD8Bpk"
social_image: "/public/image/header.webp"

# Author Information
author:
  name: "Amit Kumar"
  twitter: ai360trading
  email: admin@ai360trading.in

# Permalinks & Markdown
markdown: kramdown
highlighter: rouge

# WARNING: Do NOT change permalink format — changing breaks all indexed URLs
permalink: /:year/:month/:day/:title/

# Social Media
twitter_username: ai360trading
telegram_username: ai360trading
facebook_username: ai360trading
youtube_username: ai360trading
instagram_username: ai360trading

# Plugins
# jekyll-sitemap added April 2026 — auto-generates sitemap.xml on every build
# Previously sitemap.xml was static and never updated with new articles
# This was causing 39 "Discovered - not indexed" pages in Google Search Console
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Pagination Settings
paginate: 10
paginate_path: "/page:num/"

# Include custom pages directory
include:
  - _pages

# Exclude from Jekyll build — keep all Python/automation files out
exclude:
  - generate_articles.py
  - generate_analysis.py
  - generate_education.py
  - generate_reel.py
  - generate_reel_morning.py
  - generate_shorts.py
  - generate_kids_video.py
  - generate_community_post.py
  - content_calendar.py
  - upload_youtube.py
  - upload_youtube_english.py
  - upload_kids_youtube.py
  - upload_facebook.py
  - upload_instagram.py
  - trading_bot.py
  - ai_client.py
  - human_touch.py
  - indian_holidays.py
  - token_refresh.py
  - requirements.txt
  - SYSTEM.md
  - README.md
  - LICENSE.md
  - Gemfile
  - Gemfile.lock
  - .github/
  - vendor/
  - output/
  - token.json
  - sitemap.xml

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_posts"
    values:
      layout: "post"
      author: "ai360trading"
