# ==========================================
# Site Settings - AI360TRADING GLOBAL
# Updated: May 2026
# ==========================================
name: "AI360Trading"
title: "AI360Trading | NIFTY, S&P 500 & Global Market Intelligence"
description: "Daily AI-powered market intelligence for NIFTY, S&P 500, FTSE 100 and IBOVESPA. Swing and positional trading signals for traders in India, US, UK and Brazil."
url: "https://ai360trading.in"
enforce_ssl: ai360trading.in
baseurl: ""
timezone: "Asia/Kolkata"
future: true
encoding: "utf-8"

# SEO & Ownership
google_site_verification: "2yLD14QlM9ElbyiFZO_pUf-hTO09aCQEinK5LqD8Bpk"
social_image: "/public/image/header.webp"

# Ad network switch — keep FALSE until you sign up for an AdSense alternative
# (Adsterra / Media.net / Ezoic). When true, the {% include adslot.html %} slots
# become visible. See _includes/adslot.html for where to paste your ad code.
ads_active: false

# Author Information
author:
  name: "Amit Kumar"
  twitter: ai360trading
  email: admin@ai360trading.in

# Permalinks & Markdown
markdown: kramdown
highlighter: rouge
# WARNING: Do NOT change permalink format — changing breaks all indexed URLs
permalink: /:year/:month/:day/:title/

# Social Media
telegram_username: ai360trading
facebook_username: ai360trading.official
youtube_username: ai360trading
instagram_username: ai360trading

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# Pagination Settings
paginate: 10
paginate_path: "/page:num/"

# Include custom pages directory
include:
  - _pages

# Exclude from Jekyll build
# FIX (May 2026):
#   REMOVED: generate_analysis.py (deleted from repo)
#   REMOVED: generate_community_post.py (deleted from repo)
#   REMOVED: upload_instagram.py (actually deleted 2026-06-03 — orphaned, IG auto never wired)
#   ADDED: kids_content_calendar.py (new file, must be excluded)
exclude:
  - generate_articles.py
  - generate_education.py
  - generate_reel.py
  - generate_reel_morning.py
  - generate_shorts.py
  - generate_kids_video.py
  - generate_english_short.py
  - content_calendar.py
  - kids_content_calendar.py
  - trending_keywords.py
  - upload_youtube.py
  - upload_kids_youtube.py
  - upload_facebook.py
  - trading_bot.py
  - ai_client.py
  - human_touch.py
  - indian_holidays.py
  - token_refresh.py
  - requirements.txt
  - .internal-ops.md
  - README.md
  - LICENSE.md
  - Gemfile
  - Gemfile.lock
  - .github/
  - vendor/
  - output/
  - token.json

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_posts"
    values:
      layout: "post"
      author: "ai360trading"
  - scope:
      path: "page*"
    values:
      sitemap: false
