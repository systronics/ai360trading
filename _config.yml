# ==========================================
# Site Settings - AI360TRADING GLOBAL
# Updated: May 2026
# ==========================================
name: "AI360Trading"
title: "AI360Trading | NIFTY, S&P 500 & Global Market Intelligence"
description: "Daily AI-powered market intelligence for NIFTY, S&P 500, FTSE 100 and IBOVESPA. Swing and positional trading signals for traders in India, US, UK and Brazil."
url: "https://ai360trading.in"
enforce_ssl: ai360trading.in
baseurl: ""
timezone: "Asia/Kolkata"
future: true
encoding: "utf-8"

# SEO & Ownership
google_site_verification: "2yLD14QlM9ElbyiFZO_pUf-hTO09aCQEinK5LqD8Bpk"
social_image: "/public/image/header.webp"

# Author Information
author:
  name: "Amit Kumar"
  twitter: ai360trading
  email: admin@ai360trading.in

# Permalinks & Markdown
markdown: kramdown
highlighter: rouge
# WARNING: Do NOT change permalink format — changing breaks all indexed URLs
permalink: /:year/:month/:day/:title/

# Social Media
twitter_username: ai360trading
telegram_username: ai360trading
facebook_username: ai360trading.official
youtube_username: ai360trading
instagram_username: ai360trading

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-redirect-from

# Pagination Settings
paginate: 10
paginate_path: "/page:num/"

# Include custom pages directory
include:
  - _pages

# Exclude from Jekyll build
# WARNING: Add ALL Python files and non-Jekyll files here
# Missing entries = Jekyll tries to process them = build errors
exclude:
  # ── Trading content generators ────────────────────────────────────────
  - generate_analysis.py
  - generate_education.py
  - generate_reel.py
  - generate_reel_morning.py
  - generate_shorts.py
  - generate_community_post.py
  - generate_english_short.py
  - generate_articles.py

  # ── Kids content generators ───────────────────────────────────────────
  - generate_kids_video.py

  # ── Upload scripts ────────────────────────────────────────────────────
  - upload_youtube.py
  - upload_kids_youtube.py
  - upload_facebook.py
  - upload_instagram.py

  # ── Trading bot ───────────────────────────────────────────────────────
  - trading_bot.py

  # ── Core infrastructure ───────────────────────────────────────────────
  - ai_client.py
  - human_touch.py
  - indian_holidays.py
  - token_refresh.py
  - content_calendar.py
  - kids_content_calendar.py    # v2.0 — added

  # ── Documentation ─────────────────────────────────────────────────────
  - SYSTEM.md
  - REPO_STRUCTURE.md           # v2.0 — added
  - README.md
  - LICENSE.md

  # ── Config & requirements ─────────────────────────────────────────────
  - requirements.txt
  - Gemfile
  - Gemfile.lock

  # ── Build & local artifacts ───────────────────────────────────────────
  - .github/
  - vendor/
  - output/
  - token.json
  - sitemap.xml
  - .env
  - credentials.json

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_posts"
    values:
      layout: "post"
      author: "ai360trading"
  - scope:
      path: "page*"
    values:
      sitemap: false

# jekyll-sitemap: exclude low-value pages from auto-generated sitemap
# Tag pages, pagination, and system files should not appear in sitemap
