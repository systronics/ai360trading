<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <style>
    /* RESET & BASE */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background-color: #f8faff; color: #1e293b; }

    /* HEADER SECTION */
    .header-container { text-align: center; background: #ffffff; padding: 30px 20px; border-bottom: 1px solid #e2e8f0; width: 100%; }
    .header-banner-img { display: block; margin: 0 auto 20px; max-width: 450px; width: 90%; height: auto; }

    .site-nav { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-bottom: 20px; }
    .nav-link { text-decoration: none; color: #0062ff !important; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* CONTENT AREA */
    .content-wrapper { max-width: 1100px; margin: 0 auto; padding: 40px 20px; min-height: 70vh; }

    /* FOOTER */
    .site-footer { background: #101c28; color: #ffffff; padding: 40px 20px; text-align: center; margin-top: 60px; }

    /* COOKIE BANNER */
    #cookie-banner { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; color: #ffffff; padding: 15px 25px; z-index: 9999; display: flex; justify-content: space-between; align-items: center; }
    #cookie-banner a { color: #60a5fa; text-decoration: underline; }
    #cookie-accept-btn { background: #0062ff; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

  <header class="header-container">
    <a href="/">
      <img src="/public/image/header.webp" alt="AI360Trading Terminal" class="header-banner-img">
    </a>

    <nav class="site-nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/about/" class="nav-link">About</a>
      <a href="/contact/" class="nav-link">Contact</a>
      <a href="/disclaimer/" class="nav-link">Disclaimer</a>
      <a href="/policy/" class="nav-link">Policy</a>
    </nav>
  </header>

  <main class="content-wrapper">

    <!-- EZOIC TOP AD (COMMENTED OUT UNTIL APPROVAL) -->
    <!--
    <div id="ezoic-pub-ad-placeholder-101"></div>
    <script>
        ezstandalone.cmd.push(function () {
            ezstandalone.showAds(101);
        });
    </script>
    -->

    {{ content }}

    <!-- EZOIC BOTTOM AD (COMMENTED OUT) -->
    <!--
    <div id="ezoic-pub-ad-placeholder-102"></div>
    <script>
        ezstandalone.cmd.push(function () {
            ezstandalone.showAds(102);
        });
    </script>
    -->

  </main>

  <!-- EZOIC FOOTER AD (COMMENTED OUT) -->
  <!--
  <div id="ezoic-pub-ad-placeholder-103"></div>
  <script>
      ezstandalone.cmd.push(function () {
          ezstandalone.showAds(103);
      });
  </script>
  -->

  <footer class="site-footer">
    <p>© 2026 AI360TRADING | Institutional Grade Market Intelligence</p>
  </footer>

  <!-- COOKIE CONSENT BANNER -->
  <div id="cookie-banner">
    <p>We use cookies for analytics and personalized advertising. By continuing to use this site, you agree to our <a href="/policy/">Privacy Policy</a>.</p>
    <button id="cookie-accept-btn" onclick="acceptCookies()">Accept & Continue</button>
  </div>

  <script>
    function acceptCookies() {
      document.getElementById('cookie-banner').style.display = 'none';
      try { localStorage.setItem('cookie_accepted', 'true'); } catch(e) {}
    }
    try {
      if (localStorage.getItem('cookie_accepted') !== 'true') {
        document.getElementById('cookie-banner').style.display = 'flex';
      }
    } catch(e) {
      document.getElementById('cookie-banner').style.display = 'flex';
    }
  </script>

</body>
</html>
