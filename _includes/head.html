<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Primary Meta -->
  <title>{% if page.title %}{{ page.title }}{% else %}AI360Trading | Global Market Intelligence Terminal{% endif %}</title>

  <!-- CHANGED: Default description now reflects all 4 markets — India, US, UK, Brazil -->
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Daily AI-powered market intelligence for NIFTY, S&P 500, FTSE 100 and IBOVESPA. Swing and positional trading signals for India, US, UK and Brazil.{% endif %}">

  <!-- CHANGED: Keywords now cover all 4 target markets instead of India-only -->
  <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}NIFTY trading signals, S&P 500 analysis, FTSE 100 today, IBOVESPA analysis, stock market India, swing trading signals, Bitcoin analysis, global market intelligence, AI trading terminal{% endif %}">

  <meta name="author" content="Amit Kumar">

  <!-- ADDED: Preload hero image — browser fetches it immediately, directly improves LCP score -->
  <link rel="preload" as="image" href="{{ '/public/image/header.webp' | absolute_url }}">

  <!-- Canonical -->
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}AI360Trading | Global Market Intelligence{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}Daily AI-powered market intelligence for NIFTY, S&P 500, FTSE 100 and IBOVESPA.{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:site_name" content="AI360Trading">
  <meta property="og:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/public/image/header.webp' | absolute_url }}{% endif %}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}AI360Trading{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}Daily AI-powered market intelligence for NIFTY, S&P 500, FTSE 100 and IBOVESPA.{% endif %}">
  <meta name="twitter:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ '/public/image/header.webp' | absolute_url }}{% endif %}">

  <!-- Favicon -->
  <link rel="shortcut icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/apple-touch-icon.png' | relative_url }}">

  <!-- FIX 1: Font Awesome — load async to remove render blocking -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"></noscript>

  <!-- FIX 2: Google Fonts — preconnect + display=swap already set -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- FIX 3: Load font async with media trick — removes render blocking -->
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"></noscript>

  <!-- FIX 4: Local CSS — served from same domain, no blocking issue -->
  <link rel="stylesheet" href="{{ '/public/css/poole.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/public/css/gpstyle.css' | relative_url }}">

  <!-- FIX 5: Inline critical font fallback so page renders immediately without flash -->
  <style>
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>

  <!-- JSON-LD: NewsArticle schema — fires on every page for blog posts -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "NewsArticle",
    "headline": "{{ page.title | escape }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "Amit Kumar",
      "url": "https://ai360trading.in/about/"
    },
    "publisher": {
      "@type": "Organization",
      "name": "AI360Trading",
      "url": "https://ai360trading.in",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ '/public/image/header.webp' | absolute_url }}"
      }
    },
    "description": "{% if page.description %}{{ page.description | escape }}{% else %}Global Market Intelligence Report by AI360Trading{% endif %}",
    "url": "{{ page.url | absolute_url }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>

  <!-- ADDED: Organization + WebSite schema — homepage only, zero impact on other pages -->
  {% if page.url == '/' %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "AI360Trading",
    "url": "https://ai360trading.in",
    "logo": "{{ '/public/image/header.webp' | absolute_url }}",
    "description": "Daily market intelligence terminal covering NIFTY, S&P 500, FTSE 100 and IBOVESPA for traders in India, US, UK and Brazil.",
    "sameAs": ["https://t.me/ai360trading"]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "AI360Trading",
    "url": "https://ai360trading.in"
  }
  </script>
  {% endif %}

  <!-- Google Analytics — async, non-blocking -->
  {% if site.google_analytics %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics }}', { anonymize_ip: true });
  </script>
  {% endif %}

</head>
