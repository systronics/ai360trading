name: Generate Daily Shorts (Zeno-Enabled)

on:
  schedule:
    # Runs at 04:00 UTC (9:30 AM IST) every day to match market open
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allows you to run it manually from the Actions tab

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed if you commit logs or assets back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation

      - name: Install Python Requirements
        run: |
          pip install --upgrade pip
          pip install groq edge-tts Pillow moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Prepare Directories
        run: |
          mkdir -p output
          mkdir -p public/image

      - name: Run Market Analysis Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VIDEO_TYPE: SHORT
        run: python generate_analysis.py

      - name: Run Education Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VIDEO_TYPE: SHORT
        run: python generate_education.py

      - name: Upload Artifacts (Debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-videos
          path: output/

      # This section assumes your Python script handles the YouTube Upload
      # If you use a separate step for uploading, add it here.
      - name: Finalize
        run: echo "Shorts generation process completed."
