name: "Daily Shorts — AI360Trading (Short 2 + Short 3)"

# v2.3 (2026-07-24):
#   TIME CHANGE: Mon-Fri shorts moved 11:30 AM → 4:00 PM IST. 11:30 AM sat
#   in the middle of live market hours — the target audience (active
#   traders) is watching charts then, not scrolling Instagram/YouTube.
#   4:00 PM is right after market close (3:30 PM), when traders are
#   reviewing the day's action while it's still fresh. Sat-Sun unchanged
#   (no market-hours conflict on non-trading days). Owner-approved.
#
# v2.2 (May 2026):
#   ADDED: Telegram failure notification step
#
# v2.1 FIX (May 2026):
#   FIXED: Only GROQ_API_KEY was passed — now all 4 AI keys passed
#   When Groq hits daily limit (100k tokens) → Gemini → Anthropic → OpenAI
#   KEPT: Everything else unchanged from existing working version

on:
  workflow_dispatch:
  schedule:
    # Mon-Fri: 4:00 PM IST (10:30 UTC)
    - cron: "30 10 * * 1-5"
    # Sat-Sun: 1:30 PM IST (08:00 UTC)
    - cron: "0 8 * * 6,0"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu fonts-liberation \
            fonts-freefont-ttf fonts-ubuntu imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Detect content mode
        id: detect_mode
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] {e} — defaulting to market")
              mode = "market"
              holiday_name = ""
          print(f"[MODE] Shorts mode: {mode.upper()}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF

      - name: Restore analysis_video_id
        run: |
          if [ ! -f output/analysis_video_id.txt ]; then
            echo "UPLOAD_FAILED" > output/analysis_video_id.txt
          fi

      - name: Generate + Upload Short 2 + Short 3
        env:
          # FIX v2.1: All 4 AI keys — fallback chain works fully
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          META_ACCESS_TOKEN:   ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID:   ${{ secrets.FACEBOOK_GROUP_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:        ${{ env.HOLIDAY_NAME }}
        run: |
          echo "[SHORTS] Generating Hindi short — mode: $CONTENT_MODE"
          python generate_shorts.py
          echo "✅ Hindi short done"

      - name: Upload artifacts for debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-${{ github.run_id }}
          path: |
            output/short2_*.mp4
            output/short3_*.mp4
          retention-days: 3

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            ${{ github.workflow }}
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "Engineer will investigate. Live trade alerts unaffected.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF
