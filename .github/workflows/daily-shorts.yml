name: "Daily Shorts — AI360Trading (Hindi + English)"

on:
  workflow_dispatch:
  schedule:
    # Mon-Fri: 11:30 AM IST (06:00 UTC)
    - cron: "0 6 * * 1-5"
    # Sat-Sun: 1:30 PM IST (08:00 UTC)
    - cron: "0 8 * * 6,0"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu \
            fonts-liberation \
            fonts-freefont-ttf \
            fonts-ubuntu \
            imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt
          pip install gspread oauth2client

      - name: Prepare workspace
        run: mkdir -p output

      - name: Detect content mode (market / weekend / holiday)
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] indian_holidays error: {e} — defaulting to market mode")
              mode = "market"
              holiday_name = ""
          print(f"[MODE] Shorts content mode: {mode.upper()}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF

      # ─── HINDI Short ────────────────────────────────────────────────────────
      # Weekday: top stock from AlertLog (highest Priority Score)
      # Weekend: Base Prepared / Near Breakout from Nifty200
      # ZENO emotion auto-selected based on stock sentiment + % move
      - name: Generate + Upload Short (Hindi)
        env:
          CONTENT_MODE:             ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:             ${{ env.HOLIDAY_NAME }}
          SHORT_LANG:               hi
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS:      ${{ secrets.YOUTUBE_CREDENTIALS }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          META_ACCESS_TOKEN:        ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:         ${{ secrets.FACEBOOK_PAGE_ID }}
        run: |
          echo "[SHORTS] Generating Hindi short — mode: $CONTENT_MODE"
          python generate_shorts.py
          echo "✅ Hindi short done"

      # ─── ENGLISH Short ──────────────────────────────────────────────────────
      # Same stock, same ZENO emotion — English voice (Jenny)
      # Uploads to English channel if YOUTUBE_CREDENTIALS_EN is set
      - name: Generate + Upload Short (English)
        env:
          CONTENT_MODE:             ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:             ${{ env.HOLIDAY_NAME }}
          SHORT_LANG:               en
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS_EN:   ${{ secrets.YOUTUBE_CREDENTIALS_EN }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "[SHORTS] Generating English short — mode: $CONTENT_MODE"
          python generate_shorts.py
          echo "✅ English short done"

      - name: Upload artifacts for debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-${{ github.run_id }}
          path: |
            output/short_*.mp4
            output/short_meta_*.json
          retention-days: 3
