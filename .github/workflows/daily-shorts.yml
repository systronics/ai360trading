name: Daily YouTube Shorts — Trade Setup + Market Pulse

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5"    # 11:30 AM IST Mon-Fri (after analysis video done)
    - cron: "0 8 * * 6,0"    # 1:30 PM IST Sat-Sun

jobs:
  generate-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { ref: master }

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-liberation fonts-dejavu fonts-freefont-ttf fonts-ubuntu
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>/<policy domain="path" rights="read|write" pattern="@*"\/>/' /etc/ImageMagick-6/policy.xml || true

      - name: Python dependencies
        run: pip install -r requirements.txt

      - name: Write YouTube OAuth token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_CREDENTIALS" > token.json
          echo "✅ token.json ready"

      - name: Generate and upload both shorts
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          python generate_shorts.py
          echo "✅ Both shorts uploaded"

      - name: Cleanup
        if: always()
        run: |
          rm -f token.json
          rm -rf output/
