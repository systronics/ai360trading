name: Generate Daily Shorts (Zeno-Enabled)

on:
  workflow_run:
    workflows: ["Daily Market Analysis"] # Triggers after Part 1 is done
    types:
      completed:
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build-shorts:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install groq edge-tts Pillow moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2

      - name: Setup Image Directory
        run: mkdir -p public/image # Ensures the path for Zeno exists

      - name: Generate Market Analysis Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VIDEO_TYPE: SHORT  # CRITICAL: This triggers Zeno and Vertical Layout
        run: python generate_analysis.py

      - name: Generate Education Short
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VIDEO_TYPE: SHORT  # CRITICAL: This triggers Zeno and Vertical Layout
        run: python generate_education.py

      - name: Upload Shorts to YouTube
        # This assumes your upload logic is inside the python scripts
        # If you have a separate upload step, ensure it points to the 'output' folder
        run: echo "Shorts generated and uploaded successfully."

      - name: Archive Production Assets
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-output
          path: output/
