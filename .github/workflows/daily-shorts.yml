name: "Daily Shorts — AI360Trading (Short 2 + Short 3)"

on:
  workflow_dispatch:
  schedule:
    # Mon-Fri: 11:30 AM IST (Market Mid-Day Pulse)
    - cron: "0 6 * * 1-5"
    # Sat-Sun: 1:30 PM IST (Weekend Education)
    - cron: "0 8 * * 6,0"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu fonts-liberation fonts-freefont-ttf fonts-ubuntu imagemagick
          # Mandatory ImageMagick fix for MoviePy TextClip
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Detect content mode
        id: detect_mode
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              mode = "market"
              holiday_name = ""
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF

      - name: 📥 Restore analysis_video_id from morning run
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: daily-videos.yml
          name: market-analysis-id
          path: output
          check_artifacts: true
          search_status: success
        continue-on-error: true

      - name: 🎥 Step 1 - Generate Shorts (Trade Setup & Market Pulse)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONTENT_MODE: ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME: ${{ env.HOLIDAY_NAME }}
        run: python generate_shorts.py

      - name: 🚀 Step 2 - Upload to YouTube Shorts
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python upload_youtube.py

      - name: 📱 Step 3 - Post to Facebook & Instagram
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:     ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID:    ${{ secrets.FACEBOOK_GROUP_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          python upload_facebook.py
          python upload_instagram.py

      - name: 📦 Archive Shorts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-package
          path: |
            output/short2_*.mp4
            output/short3_*.mp4
            output/seo_meta.txt
          retention-days: 3
