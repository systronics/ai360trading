name: Generate Reels and Shorts
on:
  workflow_dispatch:
  # Add your schedule here if needed

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # Fix: Installing specific fonts so MoviePy doesn't crash
          sudo apt-get install -y ffmpeg imagemagick fonts-liberation fonts-dejavu
          # Fix: ImageMagick Policy
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml
      - name: Install Python Libs
        run: pip install -r requirements.txt
      - name: 📥 Retrieve Context
        uses: actions/download-artifact@v4
        with:
          name: market-context
          path: output/
        continue-on-error: true
      - name: Run Generator
        run: |
          python generate_shorts.py
          # If you use generate_reel.py separately, add it here:
          # python generate_reel.py
