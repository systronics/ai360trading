name: "Daily Shorts — AI360Trading (Short 2 + Short 3)"

# v2.1 FIX (May 2026):
#   Added GEMINI_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY to env
#   Without these, when Groq hits daily limit (happens by 11:30 AM)
#   no fallback provider is available → shorts use generic template

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5"    # Mon-Fri 11:30 AM IST
    - cron: "0 8 * * 6,0"    # Sat-Sun 1:30 PM IST

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu fonts-liberation fonts-freefont-ttf fonts-ubuntu imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Detect content mode
        id: detect_mode
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] indian_holidays error: {e} — defaulting to market")
              mode = "market"
              holiday_name = ""
          print(f"[MODE] Shorts content mode: {mode.upper()}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF

      - name: Restore analysis_video_id
        run: |
          if [ ! -f output/analysis_video_id.txt ]; then
            echo "UPLOAD_FAILED" > output/analysis_video_id.txt
          fi

      - name: Generate + Upload Short 2 + Short 3
        env:
          # FIX: All 4 AI providers passed — fallback chain works fully
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          META_ACCESS_TOKEN:   ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:    ${{ secrets.FACEBOOK_PAGE_ID }}
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:        ${{ env.HOLIDAY_NAME }}
        run: |
          echo "[SHORTS] Generating Hindi short — mode: $CONTENT_MODE"
          python generate_shorts.py
          echo "✅ Hindi short done"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-shorts-${{ github.run_id }}
          path: output/short*.mp4
          retention-days: 3
