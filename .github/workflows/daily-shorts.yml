name: daily-shorts
on:
  schedule:
    - cron: '0 6 * * 1-5' # 11:30 AM IST
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Download Morning ID
        uses: dawidd6/action-download-artifact@v3
        with:
          workflow: daily-videos.yml
          name: market-analysis-id
          path: output/
          if_no_artifact_found: warn
      - name: Run Shorts Generation
        run: python generate_shorts.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
