name: Update YouTube Video List
# Runs every Sunday 6 AM IST (0:30 UTC) — fetches latest LONG-FORM education videos from channel RSS
# No API key needed — YouTube provides a public RSS feed for every channel
# Shorts are filtered out: title contains #Shorts OR duration <= 60 seconds
on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 0"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Fetch long-form videos (filter out Shorts)
        run: |
          python - <<'EOF'
          import json, requests, xml.etree.ElementTree as ET

          CHANNEL_ID    = "UC9dAJakbfPXk8zL31AVuTfA"
          RSS_URL       = f"https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}"
          SHORTS_WORDS  = ["#shorts", "#short"]   # case-insensitive check
          MAX_VIDEOS    = 8

          try:
              r = requests.get(RSS_URL, timeout=12, headers={"User-Agent": "Mozilla/5.0"})
              r.raise_for_status()
              root = ET.fromstring(r.content)
          except Exception as e:
              print(f"❌ RSS fetch failed: {e}")
              exit(0)

          ns = {
              "atom":  "http://www.w3.org/2005/Atom",
              "yt":    "http://www.youtube.com/xml/schemas/2015",
              "media": "http://search.yahoo.com/mrss/",
          }

          videos = []
          for entry in root.findall("atom:entry", ns):
              try:
                  vid_id   = entry.find("yt:videoId",     ns).text
                  title_el = entry.find("atom:title",     ns)
                  pub_el   = entry.find("atom:published", ns)
                  title     = title_el.text  if title_el  is not None else "Untitled"
                  published = pub_el.text[:10] if pub_el is not None else ""

                  # ── Filter 1: title contains #Shorts ─────────────────────
                  if any(kw in title.lower() for kw in SHORTS_WORDS):
                      print(f"  ⏭  Skipping Short (title): {title[:55]}")
                      continue

                  # ── Filter 2: duration <= 60 s (YouTube defines Shorts ≤ 60s) ──
                  duration = 0
                  mg = entry.find("media:group", ns)
                  if mg is not None:
                      mc = mg.find("media:content", ns)
                      if mc is not None:
                          try:
                              duration = int(mc.get("duration", "0"))
                          except ValueError:
                              pass
                  if 0 < duration <= 60:
                      print(f"  ⏭  Skipping Short ({duration}s): {title[:55]}")
                      continue

                  videos.append({
                      "id":        vid_id,
                      "title":     title,
                      "published": published,
                      "duration":  duration,
                  })
                  print(f"  ✅ Long video ({duration}s): {title[:55]}")

              except Exception as ex:
                  print(f"  ⚠️  Parse error: {ex}")
                  continue

          videos = videos[:MAX_VIDEOS]

          with open("_data/youtube_videos.json", "w", encoding="utf-8") as f:
              json.dump(videos, f, indent=2, ensure_ascii=False)

          print(f"\n✅ Saved {len(videos)} long-form videos to _data/youtube_videos.json")
          EOF

      - name: Commit updated video list
        run: |
          git config --local user.email "admin@ai360trading.in"
          git config --local user.name "AI360-Automation"
          git add _data/youtube_videos.json
          git diff --cached --quiet || git commit -m "🎥 Update YouTube long-form video list: $(date +'%Y-%m-%d')"
          git push origin master
