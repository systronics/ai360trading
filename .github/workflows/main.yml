name: AlgoTradeBot
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CHANNELS:
#   TELEGRAM_CHAT_ID = ai360trading (Free — original channel)
#   CHAT_ID_ADVANCE  = ai360trading_Advance (Rs499/month)
#   CHAT_ID_PREMIUM  = ai360trading_Premium (Bundle)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
on:
  schedule:
    # Every 5 min, 08:15–16:29 IST (02:45–10:59 UTC), Mon–Fri
    - cron: '*/5 2-10 * * 1-5'
    # Good Morning backup — 8:45 AM IST (03:15 UTC)
    - cron: '15 3 * * 1-5'
    # Noon pulse backup — 12:28 PM IST (06:58 UTC)
    - cron: '58 6 * * 1-5'
    # Market close backup — 3:15 PM IST (09:45 UTC)
    - cron: '45 9 * * 1-5'
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bot run mode'
        required: false
        default: 'trade'
        type: choice
        options:
          - trade
          - test_telegram
          - daily_summary
          - weekly_summary
jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client requests pytz
      - name: Run Trading Bot
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          CHAT_ID_ADVANCE:   ${{ secrets.CHAT_ID_ADVANCE }}
          CHAT_ID_PREMIUM:   ${{ secrets.CHAT_ID_PREMIUM }}
          BOT_MODE: ${{ github.event.inputs.mode || 'trade' }}
        run: |
          export BOT_MODE="${BOT_MODE:-trade}"
          echo "[MODE] $BOT_MODE"
          python -u trading_bot.py
