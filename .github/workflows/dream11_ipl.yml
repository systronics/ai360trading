name: "Dream11 IPL Picks — AI360Trading"
# ──────────────────────────────────────────────────────────
# Runs daily during IPL 2026 season (Mar 22 – May 30)
# Sends 5 fantasy teams to FREE Telegram channel only
#
# HOW THIS WORKS — FULLY AUTOMATIC:
#
#   Schedule auto-runs:
#     • 11:00 AM IST  — early send, squad-based (before XI announcement)
#     • 06:30 PM IST  — post-toss send for 7:30 PM matches (confirmed XI)
#     • 02:30 PM IST  — post-toss send for 3:30 PM afternoon matches
#
#   CricAPI auto-detects today's match and fetches Playing XI post-toss.
#   If XI not yet announced, smart squad filter is used as fallback.
#
# MANUAL RUN AFTER TOSS (most accurate — optional):
#   1. Actions → Dream11 IPL Picks → Run workflow
#   2. Fill PLAYING_XI_T1 and PLAYING_XI_T2 with confirmed names
#   3. Click Run — uses 100% confirmed XI
#
# REQUIRED SECRETS (Settings → Secrets → Actions):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
#   CRICAPI_KEY, GROQ_API_KEY
#   Optional: GEMINI_API_KEY, ANTHROPIC_API_KEY, OPENAI_API_KEY
# ──────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      playing_xi_t1:
        description: "Team 1 Playing XI — comma-separated exact names (fill after toss)"
        required: false
        default: ""
        type: string
      playing_xi_t2:
        description: "Team 2 Playing XI — comma-separated exact names (fill after toss)"
        required: false
        default: ""
        type: string
      force_date:
        description: "Override date (YYYY-MM-DD) for testing"
        required: false
        default: ""
        type: string

  schedule:
    # ── Early morning send (before toss) ──────────────────────────────
    # 05:30 UTC = 11:00 AM IST — squad-filter send, gets teams out early
    - cron: "30 5 * * *"

    # ── Post-toss for AFTERNOON matches (3:30 PM IST start) ───────────
    # 09:00 UTC = 2:30 PM IST — toss for afternoon matches is ~2:45 PM IST
    - cron: "0 9 * * *"

    # ── Post-toss for EVENING matches (7:30 PM IST start) ────────────
    # 13:00 UTC = 6:30 PM IST — toss for evening matches is ~7:00 PM IST
    - cron: "0 13 * * *"

jobs:
  dream11-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Core required
          pip install requests pytz groq anthropic openai
          # Gemini — install new SDK, old SDK as fallback
          pip install google-genai || pip install google-generativeai || true

      - name: Check IPL season
        id: ipl_check
        run: |
          python - <<'EOF'
          from datetime import date
          today     = date.today()
          ipl_start = date(2026, 3, 22)
          ipl_end   = date(2026, 5, 30)
          active    = "true" if ipl_start <= today <= ipl_end else "false"
          print(f"IPL_ACTIVE={active} (today={today})")
          with open("ipl_active.txt", "w") as f:
              f.write(active)
          EOF
          echo "IPL_ACTIVE=$(cat ipl_active.txt)" >> $GITHUB_ENV

      - name: Generate & Send Dream11 Picks
        if: env.IPL_ACTIVE == 'true'
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          CRICAPI_KEY:        ${{ secrets.CRICAPI_KEY }}
          # Manual XI override (most accurate — fill after toss via workflow_dispatch)
          PLAYING_XI_T1:      ${{ github.event.inputs.playing_xi_t1 }}
          PLAYING_XI_T2:      ${{ github.event.inputs.playing_xi_t2 }}
        run: |
          echo "🏏 Running Dream11 IPL picks generator..."

          if [ -n "$PLAYING_XI_T1" ]; then
            echo "✅ Manual XI provided for Team 1: $PLAYING_XI_T1"
          else
            echo "ℹ️ No manual XI — will try CricAPI, then squad filter"
          fi

          if [ -n "$PLAYING_XI_T2" ]; then
            echo "✅ Manual XI provided for Team 2: $PLAYING_XI_T2"
          else
            echo "ℹ️ No manual XI — will try CricAPI, then squad filter"
          fi

          python dream11_ipl.py
          echo "✅ Done"

      - name: Skip if off-season
        if: env.IPL_ACTIVE != 'true'
        run: echo "⏭️ IPL season not active today. Skipping."
