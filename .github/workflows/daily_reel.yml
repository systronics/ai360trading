name: AI360 Daily ZENO Reel + Social Posting

on:
  schedule:
    # 8:30 PM IST (15:00 UTC) — Prime time for Global & Indian engagement
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      content_mode:
        description: "Override content mode (leave blank for auto-detect)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - market
          - weekend
          - holiday

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml || true

      # ── 4. Python dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      # ── 5. Workspace ───────────────────────────────────────────────────────
      - name: Prepare workspace
        run: mkdir -p output

      # ── 6. AUTO-DETECT CONTENT MODE ────────────────────────────────────────
      - name: Detect content mode
        id: detect_mode
        env:
          MANUAL_OVERRIDE: ${{ github.event.inputs.content_mode }}
        run: |
          if [ -n "$MANUAL_OVERRIDE" ]; then
            echo "🔧 Manual override: $MANUAL_OVERRIDE"
            echo "CONTENT_MODE=$MANUAL_OVERRIDE" >> $GITHUB_ENV
            echo "HOLIDAY_NAME=" >> $GITHUB_ENV
          else
            python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          from indian_holidays import get_day_mode, get_holiday_name

          mode = get_day_mode()
          holiday = get_holiday_name() if mode == "holiday" else ""

          print(f"  ✅ Auto-detected mode: {mode.upper()}")
          if holiday:
              print(f"  📅 Holiday: {holiday}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday}\n")
          EOF
          fi

      - name: Show active mode
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  CONTENT MODE : $CONTENT_MODE"
          echo "  HOLIDAY NAME : $HOLIDAY_NAME"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 7. Generate ZENO Reel ──────────────────────────────────────────────
      - name: Generate ZENO Viral Reel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONTENT_MODE: ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME: ${{ env.HOLIDAY_NAME }}
        run: python generate_reel.py

      # ── 8. Upload to YouTube ───────────────────────────────────────────────
      # NOTE: No playlist assigned yet — add PLAYLIST_ZENO_WISDOM secret later
      #       when channel has enough subscribers and playlist is created.
      - name: Upload ZENO Reel to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
        run: python upload_youtube.py --type reel

      # ── 9. Post to Facebook Page ───────────────────────────────────────────
      # Facebook Group permanently removed — requires Meta App Review, zero ad revenue
      - name: Post ZENO Reel to Facebook Page
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:      ${{ env.HOLIDAY_NAME }}
        run: python upload_facebook.py

      # ── 10. Instagram — manual only ───────────────────────────────────────
      # API permanently removed. Download artifact and post manually from phone.

      # ── 11. Save artifacts ─────────────────────────────────────────────────
      - name: Upload reel artifact (for Instagram manual post)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zeno-reel-${{ github.run_number }}-${{ env.CONTENT_MODE }}
          path: |
            output/reel_*.mp4
            output/meta_*.json
          retention-days: 7

      # ── 12. Summary ────────────────────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          echo "## 🎬 ZENO Reel — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`$CONTENT_MODE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Holiday | $HOLIDAY_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Run # | ${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
