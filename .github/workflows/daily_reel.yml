name: AI360 Daily ZENO Reel + Social Posting

on:
  schedule:
    - cron: "0 3 * * 1-5"     # 8:30 AM IST Mon-Fri (market days)
    - cron: "30 5 * * 6,0"    # 11:00 AM IST Sat-Sun (weekend emotional)
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ffmpeg \
            fonts-noto-color-emoji \
            fonts-dejavu-core \
            imagemagick \
            libmagickwand-dev
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"\/>/<policy domain="path" rights="read|write" pattern="@*"\/>/' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate ZENO reel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python generate_reel.py
          echo "✅ Reel generation complete"

      - name: Upload to YouTube Shorts
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python upload_youtube.py
          echo "✅ YouTube upload complete"

      - name: Post to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          python upload_facebook.py
          echo "✅ Facebook posting complete"

      - name: Post to Instagram
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python upload_instagram.py
          echo "✅ Instagram step complete"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeno-reel-${{ github.run_id }}
          path: output/reel_*.mp4
          retention-days: 7

      - name: Send Telegram summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests, json
          from pathlib import Path
          from datetime import datetime
          bot_token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id   = os.environ.get("TELEGRAM_CHAT_ID", "")
          if not bot_token or not chat_id:
              exit(0)
          today = datetime.now().strftime("%Y%m%d")
          meta  = {}
          meta_path = Path(f"output/meta_{today}.json")
          if meta_path.exists():
              meta = json.loads(meta_path.read_text())
          weekend = datetime.now().weekday() >= 5
          mode    = "Weekend emotional" if weekend else "Weekday market+moral"
          msg = (
              f"🤖 *AI360 ZENO Reel Complete*\n"
              f"📅 {datetime.now().strftime('%d %B %Y')} — {mode}\n\n"
              f"✅ Reel generated\n"
              f"✅ YouTube Shorts: {meta.get('youtube_url','N/A')}\n"
              f"✅ Facebook posted\n"
              f"📲 Instagram: check Telegram\n\n"
              f"📌 Topic: {meta.get('topic','N/A')}\n"
              f"🏃 Run #{os.environ.get('GITHUB_RUN_NUMBER','N/A')}"
          )
          requests.post(
              f"https://api.telegram.org/bot{bot_token}/sendMessage",
              json={"chat_id": chat_id, "text": msg, "parse_mode": "Markdown"},
              timeout=10
          )
          EOF
