name: AI360 Daily Evening Reel + Social Posting

# v2.2 (May 2026):
#   ADDED: Telegram failure notification step
#
# v2.1 FIX (May 2026):
#   FIXED: Only GROQ_API_KEY passed → now all 4 AI keys
#   When Groq quota hits limit at ~11:30 AM → fallback to Gemini/Anthropic
#   KEPT: All other working code unchanged

on:
  schedule:
    # 8:30 PM IST (15:00 UTC) — Prime time for Global & Indian engagement
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      content_mode:
        description: "Override content mode"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - market
          - weekend
          - holiday

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Detect content mode
        id: detect_mode
        env:
          MANUAL_OVERRIDE: ${{ github.event.inputs.content_mode }}
        run: |
          if [ -n "$MANUAL_OVERRIDE" ]; then
            echo "CONTENT_MODE=$MANUAL_OVERRIDE" >> $GITHUB_ENV
            echo "HOLIDAY_NAME=" >> $GITHUB_ENV
          else
            python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          from indian_holidays import get_day_mode, get_holiday_name
          mode = get_day_mode()
          holiday = get_holiday_name() if mode == "holiday" else ""
          print(f"  ✅ Mode: {mode.upper()}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday}\n")
          EOF
          fi

      - name: Generate ZENO Viral Reel
        env:
          # FIX v2.1: All 4 AI keys — fallback chain
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:      ${{ env.HOLIDAY_NAME }}
        run: |
          echo "CONTENT MODE: $CONTENT_MODE"
          python generate_reel.py

      - name: Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
        run: python upload_youtube.py --type reel

      - name: Upload to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
        run: python upload_facebook.py

      # Workflow failure alert — sends to Basic channel only (not Advance/Premium
      # which are reserved for trade signals). Uses urllib (stdlib only) so it
      # works even if pip install failed earlier in this run.
      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            ${{ github.workflow }}
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "Engineer will investigate. Live trade alerts unaffected.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF
