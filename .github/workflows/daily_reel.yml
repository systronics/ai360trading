name: AI360 Daily ZENO Reel + Social Posting

on:
  schedule:
    # Mon-Fri: 12:00 PM IST AND 09:00 PM IST
    - cron: "30 6,15 * * 1-5"
    # Sat-Sun: 01:00 PM IST
    - cron: "0 7 * * 6,0"
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick
          # Fix ImageMagick policy to allow TextClip to process text
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Force MoviePy 1.0.3 to overwrite any v2.0+ dependencies
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare Workspace
        run: mkdir -p output

      - name: Step 1 - Generate ZENO reel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_reel.py

      - name: Step 2 - Upload to YouTube Shorts
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python upload_youtube.py

      - name: Step 3 - Post to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: python upload_facebook.py

      - name: Step 4 - Post to Instagram
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: python upload_instagram.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zeno-reel-${{ github.run_id }}
          path: |
            output/reel_*.mp4
            output/meta_*.json
          retention-days: 7
