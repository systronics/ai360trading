name: AI360 Daily ZENO Reel + Social Posting

on:
  schedule:
    - cron: "0 3 * * 1-5"     # 8:30 AM IST Mon-Fri
    - cron: "30 5 * * 6,0"    # 11:00 AM IST Sat-Sun
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg imagemagick
          # Mandatory fix for MoviePy TextClip permissions
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare Workspace
        run: mkdir -p output

      - name: Step 1 - Generate ZENO reel
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python generate_reel.py
          echo "✅ Reel and Metadata generation complete"

      - name: Step 2 - Upload to YouTube Shorts
        env:
          # This maps your Secret directly to the script's environment
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python upload_youtube.py
          echo "✅ YouTube upload complete"

      - name: Step 3 - Post to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          python upload_facebook.py
          echo "✅ Facebook posting complete"

      - name: Step 4 - Post to Instagram
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          python upload_instagram.py
          echo "✅ Instagram step complete"

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zeno-reel-${{ github.run_id }}
          path: |
            output/reel_*.mp4
            output/meta_*.json
          retention-days: 7
