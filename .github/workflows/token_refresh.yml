name: Token Refresh — META Facebook

# ─────────────────────────────────────────────────────────────
# Schedule: 1st and 15th of every month (~15 day cycle) to refresh well
# before the 60-day META long-lived token expires. Manual trigger available.
#
# v2.2 FIX (May 2026):
#   Added: CHAT_ID_BASIC env var for Telegram alerts (script also reads it now)
#   (2026-07-19: META_ACCESS_TOKEN_KIDS refresh removed — kids channel retired)
#   Schedule: 1st + 15th of each month (~15-day cycle, well under 60-day expiry)
#
# WHY TOKEN EXPIRES:
#   Short-lived token: 1-3 days (from Graph Explorer)
#   Long-lived token: 60 days (after fb_exchange_token call)
#   This workflow: exchanges current token → new 60-day token
#   Runs 1st + 15th of each month (~15-day cycle, well under 60-day expiry).
#   v2.2 audit BUG-7 fix (2026-05-26): corrected misleading "every 40 days"
#   comment that contradicted the actual 1st+15th cron schedule above.
# ─────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 2 1  * *'   # 1st  of every month at 7:30 AM IST
    - cron: '0 2 15 * *'   # 15th of every month at 7:30 AM IST
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force token refresh even if not scheduled'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pytz PyNaCl

      - name: Refresh META access token
        env:
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN }}
          META_APP_ID:           ${{ secrets.META_APP_ID }}
          META_APP_SECRET:       ${{ secrets.META_APP_SECRET }}
          GH_TOKEN:              ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:         ${{ secrets.CHAT_ID_BASIC }}
          CHAT_ID_ADVANCE:       ${{ secrets.CHAT_ID_ADVANCE }}
        run: python token_refresh.py
