# token_refresh.yml
# ==========================================
# Auto-refreshes META_ACCESS_TOKEN every 50 days
# Runs silently — no manual intervention needed
# Sends Telegram alert on success or failure
#
# FIX (May 2026):
#   Added META_ACCESS_TOKEN_KIDS — was missing, kids token not being refreshed
#   Changed TELEGRAM_CHAT_ID → CHAT_ID_BASIC (correct channel variable name)
#   TELEGRAM_CHAT_ID secret does not exist — alerts were going nowhere
# ==========================================

name: Auto Token Refresh

on:
  schedule:
    # Every 50 days at 10:00 AM IST (4:30 AM UTC)
    # Runs on 1st and 20th of every month (~50 day cycle)
    - cron: "30 4 1,20 * *"

  workflow_dispatch:
    inputs:
      force_refresh:
        description: "Force token refresh even if not due"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  refresh-meta-token:
    name: Refresh META Access Token
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests PyNaCl pytz --quiet

      - name: Run Token Refresh
        env:
          META_ACCESS_TOKEN:      ${{ secrets.META_ACCESS_TOKEN }}
          # FIX: Added — was missing, HerooQuest kids token was not being refreshed
          META_ACCESS_TOKEN_KIDS: ${{ secrets.META_ACCESS_TOKEN_KIDS }}
          META_APP_ID:            ${{ secrets.META_APP_ID }}
          META_APP_SECRET:        ${{ secrets.META_APP_SECRET }}
          GH_TOKEN:               ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY:      ${{ github.repository }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # FIX: Changed from TELEGRAM_CHAT_ID (does not exist) to CHAT_ID_BASIC
          CHAT_ID_BASIC:          ${{ secrets.CHAT_ID_BASIC }}
        run: |
          python token_refresh.py

      - name: Log Completion
        if: success()
        run: echo "✅ META token refreshed successfully at $(date)"

      - name: Log Failure
        if: failure()
        run: |
          echo "❌ Token refresh failed! Check Telegram for details."
          echo "Manual action required: Refresh META_ACCESS_TOKEN in GitHub Secrets"
