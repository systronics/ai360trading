name: Nifty200 Live CMP + %Change + Volume Feed

# v1.0 (2026-07-24):
#   Full-system audit found ~25 of Nifty200's 37 columns were still live
#   GOOGLEFINANCE() formulas — including CMP itself, the single most
#   foundational cell (nearly every other formula starts IF(C3="","",...)),
#   so a GOOGLEFINANCE outage on CMP alone would zero the WHOLE scoring
#   engine, the same way the 2026-06-02 RS outage did. Unlike the slow-moving
#   stats (fetch_rs.yml, 2x/day), CMP/%Change/live Volume are read by both
#   trading_bot.py and appscript.gs's unifiedManager every 5 minutes during
#   market hours — they need this dedicated 5-minute-cadence feed, a 2x/day
#   script would be far too stale for them. See fetch_live_prices.py's
#   docstring for the full honest tradeoff (yfinance-at-5-min vs
#   GOOGLEFINANCE) and .internal-ops.md 2026-07-24 for the verification
#   data gathered before this went live (CMP/%Change tracked GOOGLEFINANCE
#   within a mean 0.13% / p90 0.4% deviation across all 200 symbols).
#
# Same cadence as trading_bot.yml (08:30-16:25 IST) so a fresh CMP is always
# available before the bot/scanner read it on their own next 5-min tick.

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'   # 08:30-16:25 IST, Mon-Fri — same window as trading_bot.yml
  workflow_dispatch:

jobs:
  fetch-live-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    # Own group — MUST NOT share `trading-bot` (see fetch_rs.py's docstring:
    # sharing a group with the all-day session loop is exactly what froze RS
    # for 4 days in July, GitHub only keeps one queued run per group).
    concurrency:
      group: fetch-live-prices
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        # Lightweight, pinned install (not the full requirements.txt) — this
        # runs ~75x/day at 5-min cadence, so it deliberately skips the heavy
        # video/AI-generation stack fetch_rs.yml's 2x/day run can afford.
        # Same pattern as swing_board.yml / update-youtube-videos.yml, same
        # exact pins as requirements.txt for consistency.
        run: |
          pip install --upgrade pip
          pip install gspread==6.2.1 oauth2client==4.1.3 pytz==2026.2 yfinance==1.4.1 pandas==3.0.3

      - name: Run live price feed (writes CMP, %Change, Live_Volume columns)
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python fetch_live_prices.py --write

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            "${{ github.workflow }}"
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "CMP/%Change/Volume stay at last good reading (fail-open) "
              "until the next successful 5-min tick.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF
