name: Daily AI Market Intelligence Report

on:
  workflow_dispatch:
  schedule:
    - cron: "45 1 * * 1-5"   # 7:15 AM IST Mon-Fri (market days)
    - cron: "30 4 * * 6,0"   # 10:00 AM IST Sat-Sun (weekend educational)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install groq pytz requests pytrends python-dotenv certifi

      - name: Run AI Article Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IS_WEEKEND:   ${{ (github.event.schedule == '30 4 * * 6,0') && 'true' || 'false' }}
        run: python generate_articles.py

      - name: Commit and Push articles
        run: |
          git config --local user.email "admin@ai360trading.in"
          git config --local user.name "AI360-Automation"
          git add _posts/
          git diff --cached --quiet || git commit -m "📊 Daily Reports: $(date +'%Y-%m-%d %H:%M') IST"
          git push origin master

      - name: Share article links to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          from datetime import datetime

          META_TOKEN  = os.environ.get("META_ACCESS_TOKEN", "")
          PAGE_ID     = os.environ.get("FACEBOOK_PAGE_ID", "")
          GROUP_ID    = os.environ.get("FACEBOOK_GROUP_ID", "")
          BOT_TOKEN   = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID     = os.environ.get("TELEGRAM_CHAT_ID", "")
          GRAPH       = "https://graph.facebook.com/v21.0"
          weekend     = datetime.now().weekday() >= 5
          today_str   = datetime.now().strftime("%d %B %Y")

          if weekend:
              msg = (
                  f"📚 Weekend Special — {today_str}\n\n"
                  f"Aaj ke educational articles:\n\n"
                  f"1️⃣ Trading basics ke liye:\n🌐 https://ai360trading.in\n\n"
                  f"💡 Weekend ka best use karo — seekho, samjho, grow karo!\n\n"
                  f"🔔 Follow karo: ai360trading.in\n"
                  f"#WeekendLearning #Trading101 #ai360trading"
              )
          else:
              msg = (
                  f"📰 Aaj ke Market Articles — {today_str}\n\n"
                  f"📊 Fresh analysis aur insights:\n"
                  f"🌐 https://ai360trading.in\n\n"
                  f"💡 Daily market updates ke liye website visit karo!\n\n"
                  f"🔔 Telegram: t.me/ai360trading\n"
                  f"#StockMarket #Nifty #Trading #ai360trading"
              )

          if META_TOKEN and PAGE_ID:
              try:
                  r = requests.post(f"{GRAPH}/{PAGE_ID}/feed",
                      data={"message": msg, "link": "https://ai360trading.in",
                            "access_token": META_TOKEN}, timeout=15)
                  print(f"✅ Page post: {r.json().get('id','error')}")
              except Exception as e:
                  print(f"❌ Page post failed: {e}")

          if META_TOKEN and GROUP_ID:
              try:
                  r = requests.post(f"{GRAPH}/{GROUP_ID}/feed",
                      data={"message": msg, "access_token": META_TOKEN}, timeout=15)
                  print(f"✅ Group post: {r.json().get('id','error')}")
              except Exception as e:
                  print(f"❌ Group post failed: {e}")

          if BOT_TOKEN and CHAT_ID:
              mode = "Weekend educational" if weekend else "Weekday market"
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  json={"chat_id": CHAT_ID,
                        "text": f"📰 *Articles shared to Facebook*\nMode: {mode}\n📅 {today_str}",
                        "parse_mode": "Markdown"},
                  timeout=10
              )
          EOF
