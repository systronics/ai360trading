name: Daily AI Market Intelligence Report

on:
  workflow_dispatch:
  schedule:
    # 04:30 UTC = 10:00 AM IST | 12:30 PM CST | 04:30 AM UK | 12:30 AM EST
    - cron: "30 4 * * 1-5"   
    # Weekend: 06:00 UTC = 11:30 AM IST
    - cron: "0 6 * * 6,0"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            groq pytz requests pytrends python-dotenv certifi \
            cryptography

      - name: Run AI Article Generator
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON:  ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          # CRITICAL: Logic updated to match new weekend cron
          IS_WEEKEND: ${{ (github.event.schedule == '0 6 * * 6,0') && 'true' || 'false' }}
        run: python generate_articles.py

      - name: Commit and Push articles
        run: |
          git config --local user.email "admin@ai360trading.in"
          git config --local user.name "AI360-Automation"
          git add _posts/
          git diff --cached --quiet || git commit -m "📊 Daily Reports: $(date +'%Y-%m-%d %H:%M') IST"
          git push origin master

      - name: Share article links to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          from datetime import datetime

          META_TOKEN  = os.environ.get("META_ACCESS_TOKEN", "")
          PAGE_ID     = os.environ.get("FACEBOOK_PAGE_ID", "")
          GROUP_ID    = os.environ.get("FACEBOOK_GROUP_ID", "")
          GRAPH       = "https://graph.facebook.com/v21.0"
          weekend     = datetime.now().weekday() >= 5
          today_str   = datetime.now().strftime("%d %B %Y")

          if weekend:
              msg = (
                  f"📚 Weekend Special — {today_str}\n\n"
                  f"Aaj ke educational articles:\n\n"
                  f"1️⃣ Stock Market Basics\n"
                  f"2️⃣ Bitcoin and Crypto Guide\n"
                  f"3️⃣ Personal Finance Tips\n"
                  f"4️⃣ AI Trading Strategies\n\n"
                  f"👉 https://ai360trading.in\n\n"
                  f"💡 Weekend ka best use karo — seekho, samjho, grow karo!\n"
                  f"#WeekendLearning #Trading101 #ai360trading"
              )
          else:
              msg = (
                  f"📰 Aaj ke Market Articles — {today_str}\n\n"
                  f"Fresh analysis across all 4 pillars:\n\n"
                  f"📊 Stock Market Analysis\n"
                  f"₿ Bitcoin and Crypto\n"
                  f"💰 Personal Finance\n"
                  f"🤖 AI Trading Technology\n\n"
                  f"👉 https://ai360trading.in\n\n"
                  f"#StockMarket #Nifty #Trading #ai360trading #India"
              )

          for entity_id in [PAGE_ID, GROUP_ID]:
              if META_TOKEN and entity_id:
                  try:
                      r = requests.post(f"{GRAPH}/{entity_id}/feed",
                          data={"message": msg, "link": "https://ai360trading.in", "access_token": META_TOKEN}, 
                          timeout=15)
                      print(f"✅ Posted: {r.json().get('id','error')}")
                  except Exception as e:
                      print(f"❌ Post failed: {e}")
          EOF
