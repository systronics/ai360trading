name: Daily AI Market Intelligence Report
on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * 1-5"   # 10:00 AM IST Mon-Fri
    - cron: "0 6 * * 6,0"    # 11:30 AM IST Sat-Sun

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Detect content mode (market / weekend / holiday)
        id: detect_mode
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] indian_holidays error: {e} — defaulting to market mode")
              mode = "market"
              holiday_name = ""

          print(f"[MODE] Articles content mode today: {mode.upper()}")
          if holiday_name:
              print(f"[HOLIDAY] {holiday_name}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF
          echo "✅ Mode detected: $CONTENT_MODE"

      - name: Run AI Article Generator
        env:
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          CONTENT_MODE:             ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:             ${{ env.HOLIDAY_NAME }}
        run: |
          echo "[ARTICLES] Running generate_articles.py in mode: $CONTENT_MODE"
          python generate_articles.py

      - name: Commit and Push articles
        run: |
          git config --local user.email "admin@ai360trading.in"
          git config --local user.name "AI360-Automation"
          git add _posts/
          git diff --cached --quiet || git commit -m "📊 Daily Reports: $(date +'%Y-%m-%d %H:%M') IST"
          git push origin master

      - name: Share article links to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:      ${{ env.HOLIDAY_NAME }}
        run: |
          python - <<'EOF'
          import os, requests
          from datetime import datetime

          META_TOKEN   = os.environ.get("META_ACCESS_TOKEN", "")
          PAGE_ID      = os.environ.get("FACEBOOK_PAGE_ID", "")
          GROUP_ID     = os.environ.get("FACEBOOK_GROUP_ID", "")
          GRAPH        = "https://graph.facebook.com/v21.0"
          mode         = os.environ.get("CONTENT_MODE", "market")
          holiday_name = os.environ.get("HOLIDAY_NAME", "")
          today_str    = datetime.now().strftime("%d %B %Y")

          # v15.x audit BUG-8 fix (2026-05-26): removed hardcoded per-article
          # bullet lists that could mismatch what generate_articles.py actually
          # published on a given day. Message now describes the pillar set
          # generically and points readers to the homepage for the live list.
          if mode == "holiday":
              label = f"🎉 {holiday_name}" if holiday_name else "🎉 Market Holiday"
              msg = (
                  f"📚 {label} — {today_str}\n\n"
                  f"Aaj market band hai — perfect time to learn! 📖\n\n"
                  f"Today's holiday articles are live on the site —\n"
                  f"motivation, education, long-term thinking, global outlook.\n\n"
                  f"👉 https://ai360trading.in\n\n"
                  f"🌍 For investors from India, US, UK and Brazil!\n"
                  f"#HolidayLearning #InvestmentEducation #ai360trading #GlobalInvesting"
              )
          elif mode == "weekend":
              msg = (
                  f"📚 Weekend Special — {today_str}\n\n"
                  f"Aaj ke fresh educational articles live hain — across all 4 pillars:\n"
                  f"Stock Market • Crypto • Personal Finance • AI Trading.\n"
                  f"Read them at the link below, no signup needed.\n\n"
                  f"👉 https://ai360trading.in\n\n"
                  f"💡 Weekend ka best use karo — seekho, samjho, grow karo!\n"
                  f"🌍 For investors from India, US, UK and Brazil!\n"
                  f"#WeekendLearning #Trading101 #ai360trading #GlobalInvesting"
              )
          else:
              msg = (
                  f"📰 Aaj ke Market Articles — {today_str}\n\n"
                  f"Fresh AI-driven analysis live across all 4 pillars:\n"
                  f"Stock Market • Crypto • Personal Finance • AI Trading.\n"
                  f"Full reading list on the homepage.\n\n"
                  f"👉 https://ai360trading.in\n\n"
                  f"🔔 Telegram: t.me/ai360trading\n"
                  f"#StockMarket #Nifty #Trading #ai360trading #India"
              )

          for entity_id in [PAGE_ID, GROUP_ID]:
              if META_TOKEN and entity_id:
                  try:
                      r = requests.post(
                          f"{GRAPH}/{entity_id}/feed",
                          data={"message": msg, "link": "https://ai360trading.in", "access_token": META_TOKEN},
                          timeout=15
                      )
                      label = "Page" if entity_id == PAGE_ID else "Group"
                      print(f"✅ {label} [{mode} mode]: {r.json().get('id', 'error')}")
                  except Exception as e:
                      print(f"❌ Post failed: {e}")
          EOF
