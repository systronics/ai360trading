name: Trading Bot — Signal Monitor
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# v2.2 (May 2026):
#   ADDED: concurrency group — prevents double-entry if a run
#   takes >5 min and the next cron fires before it finishes.
#   cancel-in-progress:false so the running trade is NOT killed.
#
# v2.1 FIX (May 2026):
#   FIXED: TELEGRAM_CHAT_ID → CHAT_ID_BASIC
#   TELEGRAM_CHAT_ID secret does NOT exist in GitHub
#   CHAT_ID_BASIC is the correct secret name
#   Without this fix: Basic channel gets NO trade alerts
#
# CHANNELS:
#   CHAT_ID_BASIC   = ai360trading (Free — original channel)
#   CHAT_ID_ADVANCE = ai360trading_Advance (Rs699/month)
#   CHAT_ID_PREMIUM = ai360trading_Premium (Bundle)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

concurrency:
  group: trading-bot
  cancel-in-progress: false

on:
  schedule:
    # v2.4 (May 2026): Removed 3 redundant backup crons — concurrency.cancel-in-progress:false
    # already queues overlapping runs, so the backups were duplicate hits at fixed times.
    # Also tightened start hour from 02:45 → 03:00 UTC to save wasted runs from 08:15-08:25 IST
    # (bot was just printing [SKIP] Outside hours during pre-open).
    # Every 5 min, 08:30–16:25 IST (03:00–10:55 UTC), Mon–Fri.
    # Coverage: 08:45 Good Morning (within 08:44-08:52 window), 09:15-15:30 market hours,
    #           15:30-15:45 close summary, 15:00-15:15 cash intraday force-exit.
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bot run mode'
        required: false
        default: 'trade'
        type: choice
        options:
          - trade
          - test_telegram
          - daily_summary
          - weekly_summary

jobs:
  trade:
    runs-on: ubuntu-latest
    # v2.3 (May 2026): raised from 4 → 8 to prevent partial-write failures on slow runs.
    # Still well under the 5-min cron interval (concurrency.cancel-in-progress:false queues overlaps).
    timeout-minutes: 8
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Trading Bot
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # FIX v2.1: TELEGRAM_CHAT_ID → CHAT_ID_BASIC (correct secret name)
          CHAT_ID_BASIC:     ${{ secrets.CHAT_ID_BASIC }}
          CHAT_ID_ADVANCE:   ${{ secrets.CHAT_ID_ADVANCE }}
          CHAT_ID_PREMIUM:   ${{ secrets.CHAT_ID_PREMIUM }}
          BOT_MODE: ${{ github.event.inputs.mode || 'trade' }}
        run: |
          export BOT_MODE="${BOT_MODE:-trade}"
          echo "[MODE] $BOT_MODE"
          python -u trading_bot.py
