name: Trading Bot — Market Session Loop

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# WHY THIS EXISTS (2026-05-30):
#   GitHub Actions throttles the high-frequency `*/5` schedule in
#   trading_bot.yml HARD. Live data showed it firing only ~3 times/day
#   (vs ~96 expected) — for 5 straight trading days. During the 6h15m
#   market window often only ONE monitoring tick actually ran, so a stock
#   could blow through its stop-loss or target uncaught for hours.
#
#   GitHub honours LOW-frequency schedules far more reliably than `*/5`.
#   So instead of trusting the scheduler for every tick, we use two
#   reliable once-daily triggers, and INSIDE each job an internal sleep
#   loop fires the bot every 5 minutes for the whole session. One reliable
#   trigger → dense, guaranteed ticks.
#
#   Repo is PUBLIC → Actions minutes are unlimited & free → a multi-hour
#   loop costs ₹0. (Two sessions because one job can't exceed GitHub's
#   6h limit; the market+greeting+close window is ~7h.)
#
# SAFETY / "never break what works":
#   • ADDITIVE — trading_bot.py is UNTOUCHED; the `*/5` cron in
#     trading_bot.yml stays as a backup (covers the 15:50-16:25 tail and
#     any day this session fails).
#   • SAME concurrency group `trading-bot` as trading_bot.yml +
#     cancel-in-progress:false ⇒ the session and the backup cron can NEVER
#     run at the same time (GitHub serialises them). No double-entry risk.
#   • Each tick is a fresh `python trading_bot.py` process — identical to
#     how the `*/5` cron invokes it. The bot self-gates by IST time
#     (good-morning 08:44-08:52, market 09:15-15:30, cash-exit 15:00-15:15,
#     close summary 15:15-15:45), so extra ticks outside those windows just
#     print [SKIP] cheaply and return before touching the sheet.
#   • A crash in one tick does NOT stop the loop (`|| true`).
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

concurrency:
  group: trading-bot
  cancel-in-progress: false

on:
  schedule:
    # Daily sessions (IST). GitHub delays low-frequency crons unpredictably
    # (seen 2026-06-02: the 08:30 trigger fired at 13:31 IST → the whole
    # morning had NO dense monitoring). MITIGATION: register MULTIPLE morning
    # start attempts (08:00 / 08:30 / 09:15 IST). Whichever GitHub honours
    # first starts the dense loop; the concurrency group `trading-bot` +
    # cancel-in-progress:false serialises the rest, so a later trigger just
    # queues harmlessly behind the running loop (no overlap, no double-entry).
    # Each is "morning session" (before noon → END=11:59), so any one of them
    # covers the 09:15 open.
    - cron: '30 2 * * 1-5'   # 08:00 IST — morning session (early start)
    - cron: '0 3 * * 1-5'    # 08:30 IST — morning session
    - cron: '45 3 * * 1-5'   # 09:15 IST — morning session (open — last-resort)
    - cron: '25 6 * * 1-5'   # 11:55 IST — afternoon session (→ ends 15:50 IST)
    # v15.18: afternoon fallbacks — GitHub sometimes delays the 11:55 trigger by
    # hours (seen 2026-06-02), which would blind afternoon SL/target monitoring.
    # These extra at/after-noon starts each open an afternoon session (END=15:50).
    # The `trading-bot` concurrency group + cancel-in-progress:false serialises
    # them: if 11:55's loop is already running they queue harmlessly; if it was
    # delayed/skipped, whichever fires first restarts the dense afternoon loop.
    - cron: '0 7 * * 1-5'    # 12:30 IST — afternoon session (fallback)
    - cron: '0 8 * * 1-5'    # 13:30 IST — afternoon session (last-resort)
  workflow_dispatch:
    inputs:
      end_time:
        description: 'Loop end time, IST HH:MM (manual runs only)'
        required: false
        default: '15:50'

jobs:
  session:
    runs-on: ubuntu-latest
    # < GitHub's 6h hard limit. The bash loop self-exits at the IST end time
    # well before this; timeout-minutes is only a runaway backstop.
    timeout-minutes: 235
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run market-session monitor loop
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:     ${{ secrets.CHAT_ID_BASIC }}
          CHAT_ID_ADVANCE:   ${{ secrets.CHAT_ID_ADVANCE }}
          CHAT_ID_PREMIUM:   ${{ secrets.CHAT_ID_PREMIUM }}
          BOT_MODE: 'trade'
          MANUAL_END: ${{ github.event.inputs.end_time }}
          TICK_SECONDS: '300'
        run: |
          export TZ=Asia/Kolkata
          # Decide this session's IST end time:
          #   • manual dispatch → use the provided end_time
          #   • scheduled before noon → morning session, end 11:59
          #   • scheduled at/after noon → afternoon session, end 15:50
          if [ -n "$MANUAL_END" ]; then
            END="$MANUAL_END"
          elif [ "$(date +%H)" -lt 12 ]; then
            END="11:59"
          else
            END="15:50"
          fi
          echo "[SESSION] start $(date '+%F %T %Z') — looping every ${TICK_SECONDS}s until ${END} IST"
          TICKS=0
          while [ "$(date +%H:%M)" \< "$END" ]; do
            TICKS=$((TICKS+1))
            echo "::group::[TICK $TICKS] $(date '+%T') IST"
            python -u trading_bot.py || echo "[TICK $TICKS] bot exited non-zero — continuing"
            echo "::endgroup::"
            # Stop sleeping if the next tick would land past the end time.
            if [ "$(date +%H:%M)" \< "$END" ]; then
              sleep "$TICK_SECONDS"
            fi
          done
          echo "[SESSION] reached ${END} IST after ${TICKS} tick(s) — done"
