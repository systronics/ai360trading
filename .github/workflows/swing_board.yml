name: Publish Swing Board (public teaser)
# Refreshes _data/swing_board.json from the live AlertLog sheet — public-safe
# columns only (symbol/type/strategy/stage/status/days) — for the free
# swing-dashboard.html teaser table. Replaces the old SwingPublic Google
# Sheets "Publish to web" embed (broke 2026-07-23, no API to republish a
# tab) with a static Jekyll data file, same doctrine as _data/performance.json.
# Runs every 15 min through market hours; fail-open (script leaves the old
# file untouched on any read error), so a missed run never breaks the page.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 3-10 * * 1-5"   # ~8:30 AM – 4:30 PM IST buffer, Mon-Fri

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal dependencies
        run: pip install gspread==6.2.1 oauth2client==4.1.3 pytz==2026.2 --quiet

      - name: Publish public swing board
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python publish_swing_board.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "admin@ai360trading.in"
          git config --local user.name "AI360-Automation"
          git add _data/swing_board.json
          git diff --cached --quiet || git commit -m "📋 Swing board refresh: $(date +'%Y-%m-%d %H:%M') IST"
          git push origin master
