name: Daily Morning Reel — AI360Trading

# v2.3 (May 2026):
#   ADDED: Telegram failure notification step
#
# v2.2 TIMING FIX (May 2026):
#   Morning reel now runs 7 DAYS a week (was Mon-Fri only)
#   Weekends: people have MORE free time = higher watch time
#   Saturday/Sunday content = "Weekend Market Prep" topic from MORNING_REEL_TOPICS

on:
  schedule:
    - cron: '30 1 * * *'   # Every day 7:00 AM IST = 1:30 AM UTC
  workflow_dispatch:
    inputs:
      content_mode:
        description: 'Force content mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - market
          - weekend
          - holiday

jobs:
  morning-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu fonts-liberation
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Detect content mode
        run: |
          if [ "${{ github.event.inputs.content_mode }}" != "auto" ] && [ -n "${{ github.event.inputs.content_mode }}" ]; then
            echo "CONTENT_MODE=${{ github.event.inputs.content_mode }}" >> $GITHUB_ENV
            echo "HOLIDAY_NAME=" >> $GITHUB_ENV
          else
            python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] indian_holidays error: {e} — defaulting to market")
              mode = "market"
              holiday_name = ""
          print(f"[MODE] Morning reel mode: {mode.upper()}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF
          fi

      - name: Generate morning reel
        env:
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:      ${{ env.HOLIDAY_NAME }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_reel_morning.py

      - name: Upload to YouTube
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
        run: python upload_youtube.py --type morning

      - name: Post to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
        run: python upload_facebook.py --meta-prefix morning
