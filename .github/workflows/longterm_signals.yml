name: Long-Term Investment Signals

# v1.0 (May 2026):
#   Weekly scanner for quality stocks (Nifty100 + curated LTWatchlist).
#   Business goal: free signal in CHAT_ID_BASIC to attract new followers.
#   Full analysis (entry zone, SL, target, reasons) → Advance + Premium only.
#   Runs Sunday 9:00 AM IST so followers get picks before Monday market open.

on:
  schedule:
    # Sunday 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 * * 0'
  workflow_dispatch:

jobs:
  longterm-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install gspread oauth2client yfinance requests pytz

      - name: Run Long-Term Signal Scanner
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:            ${{ secrets.CHAT_ID_BASIC }}
          CHAT_ID_ADVANCE:          ${{ secrets.CHAT_ID_ADVANCE }}
          CHAT_ID_PREMIUM:          ${{ secrets.CHAT_ID_PREMIUM }}
        run: python generate_longterm.py
