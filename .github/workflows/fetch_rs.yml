name: Nifty200 RS + ATR Feed

# v1.0 (2026-06-02):
#   The Nifty200 `RS` column is a GOOGLEFINANCE() historical formula. Google has
#   been failing GOOGLEFINANCE historical calls for NSE symbols, so RS = #N/A for
#   ALL ~210 stocks. That #N/A cascades:  Signal_Score → #N/A, FINAL_ACTION → #N/A,
#   Sector_Rotation_Score / Master_Score → 0.  In a BEARISH market the scanner only
#   allows a new entry via  Signal_Score>=40 AND Leader_Type="Sector Leader" AND
#   RS>=15 — so with RS/Signal_Score dead, the entire bearish entry path is silently
#   disabled.  fetch_rs.py computes a REAL RS via yfinance and writes the column,
#   reviving the dependent formulas.  ₹0 (public-repo Actions + free yfinance).
#
# v2.0 (2026-07-17):
#   1. ALSO writes a REAL ATR(14) into the "ATR (14)" column — the sheet formula
#      there was returning a single day's high−low (INDEX(range,2,2) = one cell),
#      which fed every alert's SL/target in appscript AND the bot's trailing
#      SL / resistance veto / option signals. Fixing the data fixes all of them.
#   2. CONCURRENCY FIX — the real reason RS froze on 2026-07-13: this workflow
#      shared concurrency group `trading-bot` with the all-day session loop.
#      GitHub keeps only ONE queued run per group, so every fetch_rs run queued
#      behind the session loop and was then kicked by the next session run
#      ("Canceling since a higher priority waiting request for trading-bot
#      exists") — it never executed. Sharing the group was never needed: the
#      sheet writes are atomic per API call and cannot corrupt a concurrent bot
#      read. Now uses its own `fetch-rs` group (a newer run supersedes an older).
#
# Schedule: pre-market sets RS+ATR for the trading day; a midday run keeps them
# fresh (fetch_rs.py excludes today's partial candle from ATR while the market
# is open).

on:
  schedule:
    - cron: "15 3 * * 1-5"   # 08:45 IST — pre-market (RS+ATR ready before the session loop trades)
    - cron: "0 7 * * 1-5"    # 12:30 IST — intraday refresh
  workflow_dispatch:

jobs:
  fetch-rs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # v2.0: own group — MUST NOT share `trading-bot` (see header). cancel-in-progress
    # lets a fresher scheduled run supersede a stuck older one.
    concurrency:
      group: fetch-rs
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RS + ATR feed (writes RS and ATR (14) columns)
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python fetch_rs.py --write

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            "${{ github.workflow }}"
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "RS/ATR will retry next run; values stay at last good reading "
              "(fail-open) meanwhile.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF
