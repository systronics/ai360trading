name: Auto-Fetch NSE Holidays — Monthly

# v1.3 (2026-05-30):
#   Runs the 1st of EVERY month — fetches CURRENT + NEXT year's NSE trading
#   holidays from the official API and stores them in BotMemory (HOLIDAYS_YYYY).
#   trading_bot.py + appscript.gs merge these with their hardcoded lists.
#   Monthly (not yearly) so a single failed fetch can't lose a year, and so
#   mid-year SPECIAL holidays NSE announces are captured automatically.
#   No code changes needed annually — fully autonomous.

on:
  schedule:
    # 1st of every month, 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 1 * *'
  workflow_dispatch:  # run manually anytime

jobs:
  fetch-holidays:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch current + next year's NSE holidays
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python fetch_holidays.py
