name: Auto-Fetch NSE Holidays — Yearly

# v1.0 (May 2026):
#   Runs every 1st December — fetches next year's NSE trading holidays.
#   Stores in BotMemory sheet (key: HOLIDAYS_YYYY).
#   trading_bot.py reads this and merges with its own list.
#   No code changes needed annually — fully autonomous.

on:
  schedule:
    # 1st December every year, 9:00 AM IST = 3:30 AM UTC
    - cron: '30 3 1 12 *'
  workflow_dispatch:  # run manually anytime

jobs:
  fetch-holidays:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch next year's NSE holidays
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python fetch_holidays.py
