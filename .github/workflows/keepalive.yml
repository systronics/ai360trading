name: KeepAlive

on:
  schedule:
    # 2026 Update: Native IST scheduling (11:59 PM IST, Sun-Thu)
    - cron: '59 23 * * 0-4'
      timezone: "Asia/Kolkata"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Perform Keep-Alive Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          
          # Using a timestamp to ensure the file always changes
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "$TIMESTAMP" > .keepalive
          
          git add .keepalive
          
          # Only commit and push if there is a change (prevents noise)
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: keepalive $TIMESTAMP [IST Schedule]"
            git push
          fi
