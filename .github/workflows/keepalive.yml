name: KeepAlive
# Prevents GitHub from disabling cron on inactive repos
# Runs at midnight IST (18:30 UTC previous day) so repo is active before market opens

on:
  schedule:
    - cron: '30 18 * * 0-4'  # 11:59 PM IST Sun-Thu (18:30 UTC) = before each trading day
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep alive commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push || echo "Push failed"
