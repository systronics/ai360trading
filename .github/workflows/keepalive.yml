name: KeepAlive

on:
  schedule:
    - cron: '30 18 * * 0-4'  # 11:59 PM IST Sun-Thu (Before market opens)
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keep alive commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .keepalive
          git add .keepalive
          git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push || echo "Push failed"
