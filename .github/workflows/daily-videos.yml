name: Daily NIFTY Video — AI360Trading

on:
  workflow_dispatch:        # Manual trigger anytime
  schedule:
    # ═══════════════════════════════════════════════════════
    # PEAK UPLOAD TIME STRATEGY:
    #
    # Indian stock market viewers check YouTube at TWO peaks:
    #   1. PRE-MARKET  7:00–8:30 AM IST  → commuters, prep traders
    #   2. POST-MARKET 4:00–6:00 PM IST  → review traders, learners
    #
    # Best time to POST: 7:00 AM IST = 01:30 UTC
    # YouTube promotes fresh videos during the first 2 hours.
    # Viewers searching "Nifty analysis today" find us first.
    #
    # Script runs at 01:00 UTC = 6:30 AM IST (30 min buffer for render)
    # Video goes live ~7:00 AM IST every weekday.
    # ═══════════════════════════════════════════════════════
    - cron: '0 1 * * 1-5'    # 6:30 AM IST Mon–Fri (01:00 UTC)

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu \
            fonts-freefont-ttf \
            fonts-ubuntu

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            groq \
            yfinance \
            pandas \
            numpy \
            requests \
            edge-tts \
            "moviepy==1.0.3" \
            pillow \
            imageio \
            imageio-ffmpeg \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib

      - name: Write YouTube OAuth token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_CREDENTIALS" > token.json
          echo "✅ token.json ready ($(wc -c < token.json) bytes)"

      - name: Generate and Upload Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_videos.py

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f token.json
          rm -rf output/
