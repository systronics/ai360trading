name: Daily Videos

on:
  schedule:
    # Mon-Fri 7:30 AM IST = 2:00 AM UTC
    - cron: '0 2 * * 1-5'
    # Sat-Sun 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * 0,6'
  workflow_dispatch:
    inputs:
      content_mode:
        description: 'Force content mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - market
          - weekend
          - holiday

jobs:
  daily-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-dejavu \
            fonts-liberation \
            fonts-freefont-ttf \
            fonts-ubuntu

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install \
            "Pillow>=10.3.0" \
            "imageio==2.9.0" \
            edge-tts \
            groq \
            google-generativeai \
            anthropic \
            openai \
            yfinance \
            pytz \
            requests \
            gspread \
            oauth2client \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib

      - name: Detect content mode
        id: mode
        env:
          FORCED_MODE: ${{ github.event.inputs.content_mode }}
        run: |
          if [ "$FORCED_MODE" != "auto" ] && [ -n "$FORCED_MODE" ]; then
            echo "CONTENT_MODE=$FORCED_MODE" >> $GITHUB_ENV
            echo "Using forced mode: $FORCED_MODE"
          else
            python indian_holidays.py
          fi

      - name: Create output directory
        run: mkdir -p output

      # ─── HINDI Education Video ─────────────────────────────────────────────
      # 52-week course. Week auto-calculated from COURSE_START date.
      # Uploads directly to Hindi YouTube channel.
      - name: Generate + Upload Education Video (Hindi)
        env:
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:        ${{ env.HOLIDAY_NAME }}
          EDUCATION_LANG:      hi
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python generate_education.py

      # ─── ENGLISH Education Video ───────────────────────────────────────────
      # Same course topic, same week — different language and voice (Jenny).
      # Uploads to English YouTube channel (YOUTUBE_CREDENTIALS_EN).
      # Phase 3: English channel. If YOUTUBE_CREDENTIALS_EN not set, upload skipped gracefully.
      - name: Generate + Upload Education Video (English)
        env:
          CONTENT_MODE:           ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:           ${{ env.HOLIDAY_NAME }}
          EDUCATION_LANG:         en
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS_EN: ${{ secrets.YOUTUBE_CREDENTIALS_EN }}
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python generate_education.py

      - name: Summary
        if: always()
        run: |
          echo "=== Daily Education Videos Complete ==="
          echo "Content mode: $CONTENT_MODE"
          ls -lh output/education_video_*.mp4 2>/dev/null || echo "No education MP4s found"
          ls -lh output/education_meta_*.json 2>/dev/null || echo "No meta files found"
