name: Daily YouTube Video Generator
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1-6'   # 7:30 AM IST Mon-Sat only
jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu \
            fonts-freefont-ttf
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip --break-system-packages
          pip install --break-system-packages \
            pynacl \
            groq \
            pytz \
            requests \
            edge-tts \
            "moviepy==1.0.3" \
            matplotlib \
            numpy \
            pillow \
            imageio \
            imageio-ffmpeg \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib
      - name: Verify dependencies
        run: |
          python -c "import groq, edge_tts, moviepy, matplotlib, numpy, PIL, nacl; print('All OK')"
          ffmpeg -version | head -1
          python -c "from PIL import ImageFont; ImageFont.truetype('/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',24); print('Fonts OK')"
      - name: Generate and Upload Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python generate_videos.py
      - name: Show logs on failure
        if: failure()
        run: |
          python --version
          pip list | grep -E "groq|moviepy|edge|pillow|matplotlib|nacl"
          ffmpeg -version | head -3
          df -h /tmp
