name: Daily Videos

# ─────────────────────────────────────────────────────────
# v2.1 FIXES (May 2026):
#   REMOVED: python generate_analysis.py (file was DELETED)
#   ADDED:   EDUCATION_LANG=hi and EDUCATION_LANG=en steps
#   ADDED:   google-genai to pip install (for Gemini 2.5 + Veo 2)
#   ADDED:   YOUTUBE_CREDENTIALS_EN for English education video
# ─────────────────────────────────────────────────────────

on:
  schedule:
    # Mon-Fri 7:30 AM IST = 2:00 AM UTC
    - cron: '0 2 * * 1-5'
    # Sat-Sun 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * 0,6'
  workflow_dispatch:
    inputs:
      content_mode:
        description: 'Force content mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - market
          - weekend
          - holiday

jobs:
  daily-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "Pillow>=10.3.0" \
            "imageio==2.9.0" \
            "moviepy==1.0.3" \
            edge-tts \
            groq \
            google-genai \
            google-generativeai \
            anthropic \
            openai \
            yfinance \
            pytz \
            requests \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib

      - name: Detect content mode
        id: mode
        env:
          FORCED_MODE: ${{ github.event.inputs.content_mode }}
        run: |
          if [ "$FORCED_MODE" != "auto" ] && [ -n "$FORCED_MODE" ]; then
            echo "CONTENT_MODE=$FORCED_MODE" >> $GITHUB_ENV
            echo "mode=$FORCED_MODE" >> $GITHUB_OUTPUT
            echo "Using forced mode: $FORCED_MODE"
          else
            python indian_holidays.py
          fi

      - name: Create output directory
        run: mkdir -p output

      # ─── Education Video — Hindi ────────────────────────────────────────────
      - name: Generate Education Video (Hindi)
        env:
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:        ${{ env.HOLIDAY_NAME }}
          EDUCATION_LANG:      hi
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python generate_education.py

      # ─── Education Video — English (Phase 3) ───────────────────────────────
      # Skipped gracefully if YOUTUBE_CREDENTIALS_EN not set
      - name: Generate Education Video (English)
        env:
          CONTENT_MODE:           ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:           ${{ env.HOLIDAY_NAME }}
          EDUCATION_LANG:         en
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS_EN: ${{ secrets.YOUTUBE_CREDENTIALS_EN }}
        run: python generate_education.py

      - name: Summary
        run: |
          echo "=== Daily Videos Complete ==="
          echo "Content mode: $CONTENT_MODE"
          ls -lh output/*.mp4 2>/dev/null || echo "No MP4 files found"
          ls -lh output/education_meta_*.json 2>/dev/null || echo "No meta files found"
