name: Daily Videos

on:
  schedule:
    # Mon-Fri 7:30 AM IST = 2:00 AM UTC
    - cron: '0 2 * * 1-5'
    # Sat-Sun 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * 0,6'
  workflow_dispatch:
    inputs:
      content_mode:
        description: 'Force content mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - market
          - weekend
          - holiday

jobs:
  daily-videos:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "Pillow>=10.3.0" \
            "imageio==2.9.0" \
            "moviepy==1.0.3" \
            edge-tts \
            groq \
            google-generativeai \
            anthropic \
            openai \
            yfinance \
            pytz \
            requests \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib

      - name: Detect content mode
        id: mode
        env:
          FORCED_MODE: ${{ github.event.inputs.content_mode }}
        run: |
          if [ "$FORCED_MODE" != "auto" ] && [ -n "$FORCED_MODE" ]; then
            echo "CONTENT_MODE=$FORCED_MODE" >> $GITHUB_ENV
            echo "mode=$FORCED_MODE" >> $GITHUB_OUTPUT
            echo "Using forced mode: $FORCED_MODE"
          else
            python indian_holidays.py
          fi

      - name: Create output directory
        run: mkdir -p output

      # ─── PART 1: Market Analysis ────────────────────────────────────────────
      - name: Generate Part 1 — Market Analysis
        env:
          CONTENT_MODE:       ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:       ${{ env.HOLIDAY_NAME }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python generate_analysis.py

      - name: Upload Part 1 to YouTube
        env:
          CONTENT_MODE:       ${{ env.CONTENT_MODE }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python upload_youtube.py --type analysis

      # ─── PART 2: Education Video (10+ min) ─────────────────────────────────
      - name: Generate Part 2 — Education Video (22 slides, 10-12 min)
        env:
          CONTENT_MODE:       ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:       ${{ env.HOLIDAY_NAME }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python generate_education.py

      # ✅ FIXED: Duration check — fail workflow if video is under 8 minutes
      # This prevents a short video from silently going live without mid-roll ads
      - name: Verify education video duration (must be 8+ minutes for mid-roll ads)
        run: |
          python - <<'EOF'
          import sys
          from moviepy.editor import VideoFileClip

          video_path = "output/education_video.mp4"
          try:
              v = VideoFileClip(video_path)
              dur = v.duration
              v.close()
              mins = dur / 60
              print(f"Education video duration: {dur:.1f}s ({mins:.1f} min)")
              if dur < 480:
                  print(f"CRITICAL FAIL: Video is {dur:.0f}s — under 8 minutes!")
                  print("Mid-roll ads will NOT activate on videos under 8 minutes.")
                  print("Fix: Check generate_education.py — need 22 slides, 80-100 words/slide, 1.2s pause.")
                  sys.exit(1)
              elif dur < 600:
                  print(f"WARNING: Video is {mins:.1f} min — above 8min threshold but below 10min target.")
                  print("Consider checking word counts per slide.")
              else:
                  print(f"OK: {mins:.1f} min — mid-roll ads WILL activate.")
          except Exception as e:
              print(f"Could not read video file: {e}")
              sys.exit(1)
          EOF

      - name: Upload Part 2 to YouTube
        env:
          CONTENT_MODE:       ${{ env.CONTENT_MODE }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python upload_youtube.py --type education

      - name: Summary
        run: |
          echo "=== Daily Videos Complete ==="
          echo "Content mode: $CONTENT_MODE"
          ls -lh output/*.mp4 2>/dev/null || echo "No MP4 files found"
          ls -lh output/*_meta_*.json 2>/dev/null || echo "No meta files found"
