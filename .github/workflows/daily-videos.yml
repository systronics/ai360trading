name: Daily YouTube Video Generator
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'   # Fixed: 3:30 PM IST (Mon-Fri) for Market Close
jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write       # Fixed: Must be "write" to save YouTube tokens
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu \
            fonts-freefont-ttf
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            pynacl \
            groq \
            pytz \
            requests \
            edge-tts \
            "moviepy==1.0.3" \
            matplotlib \
            numpy \
            pillow \
            imageio \
            imageio-ffmpeg \
            google-api-python-client \
            google-auth \
            google-auth-oauthlib
      - name: Generate and Upload Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python generate_videos.py
