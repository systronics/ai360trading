name: Daily NIFTY Video — AI360Trading

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1-5'    # 6:30 AM IST Mon–Fri

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with: { ref: master }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11', cache: 'pip' }

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-liberation fonts-dejavu fonts-freefont-ttf fonts-ubuntu

      - name: Python dependencies
        run: |
          pip install --upgrade pip
          pip install groq yfinance pandas numpy requests edge-tts "moviepy==1.0.3" pillow imageio imageio-ffmpeg google-api-python-client google-auth google-auth-oauthlib

      - name: Write YouTube token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: echo "$YOUTUBE_CREDENTIALS" > token.json

      - name: Generate and Upload
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_videos.py

      - name: Cleanup
        if: always()
        run: rm -f token.json && rm -rf output/
