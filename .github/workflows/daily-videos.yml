name: Daily Global Markets Video — AI360Trading

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * 1-5"   # 6:00 AM IST Mon-Fri (market days)
    - cron: "30 3 * * 6,0"   # 9:00 AM IST Sat-Sun (weekend educational)

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { ref: master }

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-liberation fonts-dejavu fonts-freefont-ttf fonts-ubuntu

      - name: Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            groq yfinance pandas numpy requests edge-tts \
            "moviepy==1.0.3" pillow "imageio==2.9.0" imageio-ffmpeg \
            "decorator==4.4.2" \
            google-api-python-client google-auth google-auth-oauthlib

      - name: Write YouTube OAuth token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_CREDENTIALS" > token.json
          echo "✅ token.json ready"

      - name: Generate and Upload Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          IS_WEEKEND:   ${{ (github.event.schedule == '30 3 * * 6,0') && 'true' || 'false' }}
        run: python generate_videos.py

      - name: Share video link to Facebook
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python - <<'EOF'
          import os, requests, json
          from datetime import datetime

          META_TOKEN  = os.environ.get("META_ACCESS_TOKEN", "")
          PAGE_ID     = os.environ.get("FACEBOOK_PAGE_ID", "")
          GROUP_ID    = os.environ.get("FACEBOOK_GROUP_ID", "")
          BOT_TOKEN   = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          CHAT_ID     = os.environ.get("TELEGRAM_CHAT_ID", "")
          GRAPH       = "https://graph.facebook.com/v21.0"
          weekend     = datetime.now().weekday() >= 5
          today_str   = datetime.now().strftime("%d %B %Y")

          # Try to get YouTube video URL from token.json output
          yt_url = "https://youtube.com/@ai360trading"
          try:
              if os.path.exists("output/latest_video_id.txt"):
                  vid_id = open("output/latest_video_id.txt").read().strip()
                  yt_url = f"https://youtube.com/watch?v={vid_id}"
          except:
              pass

          if weekend:
              msg = (
                  f"🎬 Weekend Special Video — {today_str}\n\n"
                  f"📚 Aaj ka educational video dekho!\n"
                  f"Trading basics, investing tips aur life lessons.\n\n"
                  f"👉 {yt_url}\n\n"
                  f"💡 Weekend mein seekho, weekday mein kamaao!\n"
                  f"🔔 Subscribe karo: youtube.com/@ai360trading\n\n"
                  f"#WeekendLearning #Trading101 #Investing #ai360trading"
              )
          else:
              msg = (
                  f"🎬 Aaj ka Market Video — {today_str}\n\n"
                  f"📊 Global markets analysis + Nifty outlook!\n\n"
                  f"👉 {yt_url}\n\n"
                  f"💡 Like, share aur subscribe karo!\n"
                  f"🌐 ai360trading.in | 📱 t.me/ai360trading\n\n"
                  f"#StockMarket #Nifty #GlobalMarkets #ai360trading"
              )

          if META_TOKEN and PAGE_ID:
              try:
                  r = requests.post(f"{GRAPH}/{PAGE_ID}/feed",
                      data={"message": msg, "link": yt_url,
                            "access_token": META_TOKEN}, timeout=15)
                  print(f"✅ Page post: {r.json().get('id','error')}")
              except Exception as e:
                  print(f"❌ Page post failed: {e}")

          if META_TOKEN and GROUP_ID:
              try:
                  r = requests.post(f"{GRAPH}/{GROUP_ID}/feed",
                      data={"message": msg, "link": yt_url,
                            "access_token": META_TOKEN}, timeout=15)
                  print(f"✅ Group post: {r.json().get('id','error')}")
              except Exception as e:
                  print(f"❌ Group post failed: {e}")

          if BOT_TOKEN and CHAT_ID:
              mode = "Weekend educational" if weekend else "Weekday market"
              requests.post(
                  f"https://api.telegram.org/bot{BOT_TOKEN}/sendMessage",
                  json={"chat_id": CHAT_ID,
                        "text": f"🎬 *Video shared to Facebook*\nMode: {mode}\n📅 {today_str}\n🔗 {yt_url}",
                        "parse_mode": "Markdown"},
                  timeout=10
              )
          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f token.json
          rm -rf output/
