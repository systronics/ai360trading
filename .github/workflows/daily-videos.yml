name: Daily Videos — Education

# v2.2 TIMING FIX (May 2026):
#   Changed from 8:00 AM to 10:00 AM IST
#   Reason: HerooQuest runs at 8:00 AM — same time = runner conflict
#   Education at 10:00 AM = separate runner slot = no conflict
#   10 AM IST = post-morning-rush = viewers have settled at desk
#   Better watch time than 8 AM (viewers commuting at 8 AM)

on:
  schedule:
    # Mon-Sat 10:00 AM IST = 4:30 AM UTC
    - cron: '30 4 * * 1-6'
    # Sunday 11:00 AM IST = 5:30 AM UTC (weekend learners)
    - cron: '30 5 * * 0'
  workflow_dispatch:
    inputs:
      content_mode:
        description: 'Force content mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - market
          - weekend
          - holiday

jobs:
  education-hindi:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu fonts-liberation fonts-freefont-ttf imagemagick

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Detect content mode
        run: |
          if [ "${{ github.event.inputs.content_mode }}" != "auto" ] && [ -n "${{ github.event.inputs.content_mode }}" ]; then
            echo "CONTENT_MODE=${{ github.event.inputs.content_mode }}" >> $GITHUB_ENV
          else
            python indian_holidays.py
          fi

      - name: Generate Education Video (Hindi)
        env:
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:        ${{ env.HOLIDAY_NAME }}
          EDUCATION_LANG:      hi
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python generate_education.py

      - name: Generate Education Video (English)
        env:
          CONTENT_MODE:           ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:           ${{ env.HOLIDAY_NAME }}
          EDUCATION_LANG:         en
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS_EN: ${{ secrets.YOUTUBE_CREDENTIALS_EN }}
        run: python generate_education.py

      - name: Summary
        run: |
          echo "=== Education Videos Done ==="
          echo "Mode: $CONTENT_MODE"
          ls -lh output/*.mp4 2>/dev/null | tail -5
