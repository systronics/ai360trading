name: Daily Global Markets Video — AI360Trading

on:
  schedule:
    # 02:00 UTC = 07:30 AM IST (India) | 10:00 AM CST (China) | 11:00 PM EST (US)
    - cron: "0 2 * * 1-5"
    # Weekend: 04:00 UTC = 09:30 AM IST
    - cron: "0 4 * * 6,0"

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with: { ref: master }

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-liberation fonts-dejavu fonts-freefont-ttf fonts-ubuntu

      - name: Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            groq yfinance pandas numpy requests edge-tts \
            "moviepy==1.0.3" pillow "imageio==2.9.0" imageio-ffmpeg \
            "decorator==4.4.2" \
            google-api-python-client google-auth google-auth-oauthlib

      - name: Write YouTube OAuth token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_CREDENTIALS" > token.json
          echo "✅ token.json ready"

      - name: Generate Part 1 — Market Analysis Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python generate_analysis.py
          echo "✅ Part 1 analysis video complete"

      - name: Generate Part 2 — Education Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python generate_education.py
          echo "✅ Part 2 education video complete"

      - name: Share both video links to Facebook + Group
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          python - <<'EOF'
          import os, requests
          from datetime import datetime

          META    = os.environ.get("META_ACCESS_TOKEN","")
          PAGE    = os.environ.get("FACEBOOK_PAGE_ID","")
          GROUP   = os.environ.get("FACEBOOK_GROUP_ID","")
          GRAPH   = "https://graph.facebook.com/v21.0"
          today   = datetime.now().strftime("%d %B %Y")
          weekend = datetime.now().weekday() >= 5

          analysis_url = "https://youtube.com/@ai360trading"
          edu_url      = "https://youtube.com/@ai360trading"

          try:
              with open("output/analysis_video_id.txt") as f:
                  analysis_url = f"https://youtube.com/watch?v={f.read().strip()}"
          except: pass
          try:
              with open("output/education_video_id.txt") as f:
                  edu_url = f"https://youtube.com/watch?v={f.read().strip()}"
          except: pass

          if weekend:
              msg = (
                  f"📚 Weekend Learning — {today}\n\n"
                  f"Aaj ke do special educational videos:\n\n"
                  f"🎬 Part 1 — Market Analysis:\n{analysis_url}\n\n"
                  f"📖 Part 2 — Education:\n{edu_url}\n\n"
                  f"💡 Weekend mein seekho, weekday mein kamaao!\n"
                  f"🌐 ai360trading.in | 📱 t.me/ai360trading\n\n"
                  f"#WeekendLearning #Trading101 #StockMarket #AI360Trading"
              )
          else:
              msg = (
                  f"📊 Aaj ke Market Videos — {today}\n\n"
                  f"🎬 Part 1 — Live Market Analysis + Trade Setups:\n{analysis_url}\n\n"
                  f"📖 Part 2 — Education + Learning:\n{edu_url}\n\n"
                  f"💡 Dono videos zaroor dekho — market samjho aur seekho!\n"
                  f"🌐 ai360trading.in | 📱 t.me/ai360trading\n\n"
                  f"#StockMarket #Nifty #TechnicalAnalysis #Trading #AI360Trading\n"
                  f"#GlobalMarkets #Bitcoin #Gold #IntradayTrading #SwingTrading"
              )

          for entity_id in [PAGE, GROUP]:
              if META and entity_id:
                  try:
                      r = requests.post(f"{GRAPH}/{entity_id}/feed",
                          data={"message":msg,"link":analysis_url,"access_token":META},
                          timeout=15)
                      label = "Page" if entity_id==PAGE else "Group"
                      print(f"✅ {label}: {r.json().get('id','error')}")
                  except Exception as e:
                      print(f"❌ Post failed: {e}")
          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f token.json
          rm -rf output/
