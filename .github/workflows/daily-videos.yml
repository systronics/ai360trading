name: "Daily Global Markets Video — AI360Trading"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1-5"    # 7:30 AM IST Mon-Fri
    - cron: "0 4 * * 6,0"    # 9:30 AM IST Sat-Sun

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu \
            fonts-freefont-ttf \
            fonts-ubuntu \
            imagemagick
          # Fix ImageMagick policy
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate Part 1 — Market Analysis Video + Upload to YouTube
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CREDENTIALS:   ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python generate_analysis.py
          echo "✅ Part 1 complete"

      - name: Generate Part 2 — Education Video + Upload to YouTube
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CREDENTIALS:   ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          python generate_education.py
          echo "✅ Part 2 complete"

      - name: Share both video links to Facebook Page + Group
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          python - <<'EOF'
          import os, json, requests
          from pathlib import Path
          from datetime import datetime

          META_ACCESS_TOKEN = os.environ.get("META_ACCESS_TOKEN", "")
          FACEBOOK_PAGE_ID  = os.environ.get("FACEBOOK_PAGE_ID", "")
          FACEBOOK_GROUP_ID = os.environ.get("FACEBOOK_GROUP_ID", "")
          GRAPH_BASE        = "https://graph.facebook.com/v21.0"
          OUT               = Path("output")
          today             = datetime.now().strftime("%Y%m%d")

          if not META_ACCESS_TOKEN:
              print("❌ META_ACCESS_TOKEN missing — skipping Facebook share")
              exit(0)

          # Read Part 1 meta
          part1_url   = ""
          part1_title = ""
          p1_meta     = OUT / f"analysis_meta_{today}.json"
          if p1_meta.exists():
              d           = json.loads(p1_meta.read_text(encoding="utf-8"))
              part1_url   = d.get("video_url", "")
              part1_title = d.get("title", "Market Analysis")

          # Read Part 2 meta
          part2_url   = ""
          part2_title = ""
          p2_meta     = OUT / f"education_meta_{today}.json"
          if p2_meta.exists():
              d           = json.loads(p2_meta.read_text(encoding="utf-8"))
              part2_url   = d.get("video_url", "")
              part2_title = d.get("title", "Education Video")

          if not part1_url and not part2_url:
              print("⚠️ No video URLs found — skipping Facebook share")
              exit(0)

          # Build post message
          msg = "🎬 Aaj ke do naaye videos aa gaye! Must Watch! 📊\n\n"
          if part1_url:
              msg += f"📊 Part 1 — Market Analysis:\n{part1_title}\n🔗 {part1_url}\n\n"
          if part2_url:
              msg += f"📚 Part 2 — Education:\n{part2_title}\n🔗 {part2_url}\n\n"
          msg += (
              "Daily market analysis aur education ke liye subscribe karo! 🔔\n\n"
              "🌐 https://ai360trading.in\n"
              "📱 https://t.me/ai360trading\n\n"
              "#ai360trading #StockMarket #Nifty #TradingIndia #MarketAnalysis"
          )

          # Post to Facebook Page
          try:
              resp = requests.post(
                  f"{GRAPH_BASE}/{FACEBOOK_PAGE_ID}/feed",
                  data={"message": msg, "access_token": META_ACCESS_TOKEN},
                  timeout=30
              )
              resp.raise_for_status()
              print(f"✅ Posted to Facebook Page")
          except Exception as e:
              print(f"⚠️ Facebook Page post failed: {e}")

          # Post to Facebook Group
          if FACEBOOK_GROUP_ID:
              try:
                  resp = requests.post(
                      f"{GRAPH_BASE}/{FACEBOOK_GROUP_ID}/feed",
                      data={"message": msg, "access_token": META_ACCESS_TOKEN},
                      timeout=30
                  )
                  resp.raise_for_status()
                  print(f"✅ Posted to Facebook Group")
              except Exception as e:
                  print(f"⚠️ Facebook Group post failed: {e}")
          EOF

      - name: Cleanup temp files only — keep output for shorts workflow
        if: always()
        run: |
          # Only remove temp video files — keep video IDs and meta JSONs
          # generate_shorts.py needs analysis_video_id.txt from output/
          rm -f output/analysis_*.png
          rm -f output/edu_*.png
          rm -f output/analysis_*.mp3
          rm -f output/edu_*.mp3
          rm -f output/temp_*.mp3
          rm -f token.json
          echo "✅ Temp files cleaned — video IDs preserved"
