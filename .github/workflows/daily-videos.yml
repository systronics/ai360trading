name: Daily Videos — Education

# v2.3 BILINGUAL SIMPLIFICATION (May 2026):
#   Single bilingual (Hinglish) video replaces separate Hindi + English runs.
#   Hinglish = English concepts + Hindi explanation = works for BOTH audiences.
#   Saves ~60 min GitHub Actions per day (was 2 jobs × 60 min = 120 min).
#   Uploads to YOUTUBE_CREDENTIALS (main channel) only.

on:
  schedule:
    # Mon-Sat 10:00 AM IST = 4:30 AM UTC
    - cron: '30 4 * * 1-6'
    # Sunday 11:00 AM IST = 5:30 AM UTC (weekend learners)
    - cron: '30 5 * * 0'
  workflow_dispatch:
    inputs:
      content_mode:
        description: 'Force content mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - market
          - weekend
          - holiday

jobs:
  education-bilingual:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-dejavu fonts-liberation fonts-freefont-ttf imagemagick

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create output directory
        run: mkdir -p output

      - name: Detect content mode
        run: |
          if [ "${{ github.event.inputs.content_mode }}" != "auto" ] && [ -n "${{ github.event.inputs.content_mode }}" ]; then
            echo "CONTENT_MODE=${{ github.event.inputs.content_mode }}" >> $GITHUB_ENV
            echo "HOLIDAY_NAME=" >> $GITHUB_ENV
          else
            python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] indian_holidays error: {e} — defaulting to market")
              mode = "market"
              holiday_name = ""
          print(f"[MODE] Education video mode: {mode.upper()}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF
          fi

      - name: Generate Bilingual Education Video (Hinglish)
        env:
          CONTENT_MODE:        ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:        ${{ env.HOLIDAY_NAME }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: python generate_education.py

      - name: Summary
        run: |
          echo "=== Bilingual Education Video Done ==="
          echo "Mode: $CONTENT_MODE"
          ls -lh output/*.mp4 2>/dev/null | tail -5
