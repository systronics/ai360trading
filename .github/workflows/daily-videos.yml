name: "Daily Global Markets Video — AI360Trading"
on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1-5"   # 7:30 AM IST Mon-Fri
    - cron: "0 4 * * 6,0"   # 9:30 AM IST Sat-Sun

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation \
            fonts-dejavu \
            fonts-freefont-ttf \
            fonts-ubuntu \
            imagemagick
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --force-reinstall moviepy==1.0.3
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Detect content mode (market / weekend / holiday)
        id: detect_mode
        run: |
          python - <<'EOF'
          import os, sys
          sys.path.insert(0, ".")
          try:
              from indian_holidays import get_day_mode, get_holiday_name
              mode = get_day_mode()
              holiday_name = get_holiday_name() if mode == "holiday" else ""
          except Exception as e:
              print(f"[WARN] indian_holidays error: {e} — defaulting to market mode")
              mode = "market"
              holiday_name = ""

          print(f"[MODE] Content mode today: {mode.upper()}")
          if holiday_name:
              print(f"[HOLIDAY] {holiday_name}")

          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"CONTENT_MODE={mode}\n")
              f.write(f"HOLIDAY_NAME={holiday_name}\n")
          EOF
          echo "✅ Mode detected: $CONTENT_MODE"

      # ── Part 1: Generate + Upload Analysis Video → PLAYLIST_NIFTY_ANALYSIS ─
      - name: Generate Part 1 — Market Analysis Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONTENT_MODE: ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME: ${{ env.HOLIDAY_NAME }}
        run: |
          echo "[VIDEO] Running generate_analysis.py in mode: $CONTENT_MODE"
          python generate_analysis.py
          echo "✅ Part 1 generated"

      - name: Upload Part 1 to YouTube (PLAYLIST_NIFTY_ANALYSIS)
        env:
          YOUTUBE_CREDENTIALS:      ${{ secrets.YOUTUBE_CREDENTIALS }}
          PLAYLIST_NIFTY_ANALYSIS:  ${{ secrets.PLAYLIST_NIFTY_ANALYSIS }}
          CONTENT_MODE:             ${{ env.CONTENT_MODE }}
        run: python upload_youtube.py --type analysis

      # ── Part 2: Generate + Upload Education Video → PLAYLIST_WEEKLY_OUTLOOK ─
      - name: Generate Part 2 — Education Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CONTENT_MODE: ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME: ${{ env.HOLIDAY_NAME }}
        run: |
          echo "[VIDEO] Running generate_education.py in mode: $CONTENT_MODE"
          python generate_education.py
          echo "✅ Part 2 generated"

      - name: Upload Part 2 to YouTube (PLAYLIST_WEEKLY_OUTLOOK)
        env:
          YOUTUBE_CREDENTIALS:      ${{ secrets.YOUTUBE_CREDENTIALS }}
          PLAYLIST_WEEKLY_OUTLOOK:  ${{ secrets.PLAYLIST_WEEKLY_OUTLOOK }}
          CONTENT_MODE:             ${{ env.CONTENT_MODE }}
        run: python upload_youtube.py --type education

      # ── Share both video links to Facebook Page ────────────────────────────
      # Facebook Group permanently removed — requires Meta App Review, zero ad revenue
      - name: Share both video links to Facebook Page
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          CONTENT_MODE:      ${{ env.CONTENT_MODE }}
          HOLIDAY_NAME:      ${{ env.HOLIDAY_NAME }}
        run: |
          python - <<'EOF'
          import os, json, requests
          from pathlib import Path
          from datetime import datetime

          META_ACCESS_TOKEN = os.environ.get("META_ACCESS_TOKEN", "")
          FACEBOOK_PAGE_ID  = os.environ.get("FACEBOOK_PAGE_ID", "")
          GRAPH_BASE        = "https://graph.facebook.com/v21.0"
          OUT               = Path("output")
          today             = datetime.now().strftime("%Y%m%d")
          mode              = os.environ.get("CONTENT_MODE", "market")
          holiday_name      = os.environ.get("HOLIDAY_NAME", "")

          if not META_ACCESS_TOKEN:
              print("❌ META_ACCESS_TOKEN missing — skipping Facebook share")
              exit(0)

          # Read Part 1 meta
          part1_url   = ""
          part1_title = ""
          p1_meta     = OUT / f"analysis_meta_{today}.json"
          if p1_meta.exists():
              d           = json.loads(p1_meta.read_text(encoding="utf-8"))
              part1_url   = d.get("video_url", d.get("youtube_video_url", ""))
              part1_title = d.get("title", "Market Analysis")

          # Read Part 2 meta
          part2_url   = ""
          part2_title = ""
          p2_meta     = OUT / f"education_meta_{today}.json"
          if p2_meta.exists():
              d           = json.loads(p2_meta.read_text(encoding="utf-8"))
              part2_url   = d.get("video_url", d.get("youtube_video_url", ""))
              part2_title = d.get("title", "Education Video")

          if not part1_url and not part2_url:
              print("⚠️ No video URLs found in meta — skipping Facebook share")
              exit(0)

          # Build post message
          if mode == "holiday":
              label = f"🎉 {holiday_name} Special" if holiday_name else "🎉 Market Holiday Special"
              msg = f"📚 {label} — Aaj market band hai, lekin learning band nahi!\n\n"
          elif mode == "weekend":
              msg = "📚 Weekend Learning Special — Market se zyada important hai financial education!\n\n"
          else:
              msg = "🎬 Aaj ke do naaye videos aa gaye! Must Watch! 📊\n\n"

          if part1_url:
              msg += f"📊 Part 1:\n{part1_title}\n🔗 {part1_url}\n\n"
          if part2_url:
              msg += f"📚 Part 2:\n{part2_title}\n🔗 {part2_url}\n\n"

          msg += (
              "Daily market analysis ke liye subscribe karo! 🔔\n\n"
              "🌐 https://ai360trading.in\n"
              "📱 https://t.me/ai360trading\n\n"
              "#ai360trading #StockMarket #Nifty50 #TradingIndia #MarketAnalysis"
          )

          try:
              resp = requests.post(
                  f"{GRAPH_BASE}/{FACEBOOK_PAGE_ID}/feed",
                  data={"message": msg, "access_token": META_ACCESS_TOKEN},
                  timeout=30
              )
              result = resp.json()
              if "id" in result:
                  print(f"✅ Posted to Facebook Page — Post ID: {result['id']}")
              else:
                  print(f"⚠️ Facebook Page post failed: {result}")
          except Exception as e:
              print(f"⚠️ Facebook Page post failed: {e}")
          EOF

      - name: Cleanup temp files — keep output for shorts workflow
        if: always()
        run: |
          rm -f output/analysis_*.png
          rm -f output/edu_*.png
          rm -f output/analysis_*.mp3
          rm -f output/edu_*.mp3
          rm -f output/temp_*.mp3
          rm -f token.json
          echo "✅ Temp files cleaned — video IDs preserved"
