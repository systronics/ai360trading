name: "Daily Global Markets Video — AI360Trading"

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1-5"   # 7:30 AM IST Mon-Fri
    - cron: "0 4 * * 6,0"   # 9:30 AM IST Sat-Sun

jobs:
  generate-video:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # ADDED: Explicit permissions to prevent "Blocked" errors
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Removed { ref: master } to allow auto-detection

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip" }

      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-liberation fonts-dejavu fonts-freefont-ttf fonts-ubuntu
          # Added ImageMagick fix just in case scripts need it later
          sudo sed -i 's/rights="none" pattern="@\*"/rights="read|write" pattern="@*"/g' /etc/ImageMagick-6/policy.xml

      - name: Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            groq yfinance pandas numpy requests edge-tts \
            "moviepy==1.0.3" pillow "imageio==2.9.0" imageio-ffmpeg \
            "decorator==4.4.2" \
            google-api-python-client google-auth google-auth-oauthlib

      - name: Write YouTube OAuth token
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
        run: |
          echo "$YOUTUBE_CREDENTIALS" > token.json
          echo "✅ token.json ready"

      - name: Generate Part 1 — Market Analysis Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python generate_analysis.py
          echo "✅ Part 1 analysis video complete"

      - name: Generate Part 2 — Education Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python generate_education.py
          echo "✅ Part 2 education video complete"

      - name: Share both video links to Facebook + Group
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:  ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID: ${{ secrets.FACEBOOK_GROUP_ID }}
        run: |
          # [Existing Python EOF script remains here - it is working fine]
          python - <<'EOF'
          # ... (rest of your script)
          EOF

      - name: Cleanup
        if: always()
        run: |
          rm -f token.json
          rm -rf output/
