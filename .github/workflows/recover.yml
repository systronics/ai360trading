name: Recover My Secrets (DELETE AFTER USE)
on: workflow_dispatch
jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Write all secrets
        run: |
          cat > secrets.txt << 'EOF'
          === TELEGRAM ===
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          CHAT_ID_ADVANCE=${{ secrets.CHAT_ID_ADVANCE }}
          CHAT_ID_PREMIUM=${{ secrets.CHAT_ID_PREMIUM }}

          === AI PROVIDERS ===
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}

          === GOOGLE ===
          GCP_SERVICE_ACCOUNT_JSON=${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

          === META / FACEBOOK ===
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_APP_ID=${{ secrets.META_APP_ID }}
          META_APP_SECRET=${{ secrets.META_APP_SECRET }}
          FACEBOOK_PAGE_ID=${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_GROUP_ID=${{ secrets.FACEBOOK_GROUP_ID }}
          INSTAGRAM_ACCOUNT_ID=${{ secrets.INSTAGRAM_ACCOUNT_ID }}

          === YOUTUBE ===
          YOUTUBE_CREDENTIALS=${{ secrets.YOUTUBE_CREDENTIALS }}
          YOUTUBE_CREDENTIALS_KIDS=${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}

          === DHAN TRADING ===
          DHAN_API_KEY=${{ secrets.DHAN_API_KEY }}
          DHAN_API_SECRET=${{ secrets.DHAN_API_SECRET }}
          DHAN_CLIENT_ID=${{ secrets.DHAN_CLIENT_ID }}
          DHAN_PIN=${{ secrets.DHAN_PIN }}
          DHAN_TOTP_KEY=${{ secrets.DHAN_TOTP_KEY }}

          === OTHER ===
          GH_TOKEN=${{ secrets.GH_TOKEN }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          STABILITY_API_KEY=${{ secrets.STABILITY_API_KEY }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EOF

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: my-secrets-backup
          path: secrets.txt
          retention-days: 1
