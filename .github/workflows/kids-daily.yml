name: Kids Channel — Daily Video
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:
    
jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install system deps
        run: sudo apt-get install -y ffmpeg          # ← fixes ffprobe not found

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install Pillow edge-tts pytz
          pip install google-genai                   # ← replaces google-generativeai
          pip install huggingface-hub requests
          pip install anthropic openai groq
          pip install google-api-python-client google-auth
          # moviepy removed — using ffmpeg directly now

      - name: Generate kids video
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HuggingFace FLUX.1-schnell:    ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          KIDS_LANG:         ${{ inputs.lang || 'both' }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids channel
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Upload to Facebook + Instagram
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:     ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
        run: |
          python upload_facebook.py --meta-prefix kids
          python upload_instagram.py --meta-prefix kids

      - name: Save artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kids-debug-${{ github.run_id }}
          path: output/
