name: Kids Channel — Daily Video

# v2.2 (May 2026):
#   ADDED: Telegram failure notification to all 3 jobs
#
# v2.1 FIX (May 2026):
#   FIXED: KIDS_LANG='both' not handled → now defaults to 'hi'
#   FIXED: Single job → 3 separate jobs (full + short + DYK)
#   FIXED: Only 7 pip packages → now uses requirements.txt
#   FIXED: KIDS_OUTPUT was missing → only full story generated
#   ADDED: All 4 AI provider keys for fallback chain
#   ADDED: FACEBOOK_KIDS_PAGE_ID to generate step
#   NOTE: Instagram removed — manual upload from phone

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Language mode"
        required: false
        default: "hi"
        type: choice
        options:
          - hi
          - en
  # ── PAUSED 2026-07-19 (owner decision) ─────────────────────────────────────
  # HerooQuest is mothballed as an income project: it is flagged made-for-kids
  # (comments disabled → money funnel can't be posted, lowest ad RPM, no
  # memberships) and its audience can't open demat/buy membership, so it cannot
  # feed the income model. Effort redirected to the website money engine.
  # The daily auto-run is OFF; the workflow stays runnable MANUALLY (Actions →
  # this workflow → "Run workflow") if it's ever wanted as a hobby. To fully
  # resume, un-comment the two cron lines below.
  # schedule:
  #   - cron: '30 10 * * *'  # 16:00 IST (Hindi)
  #   - cron: '0 19 * * *'   # 19:00 UTC (English)

jobs:

  # ── Hindi Full Story (~7.5 min) ────────────────────────────────────────────
  kids-hindi-full:
    # Hindi cron only (16:00 IST); workflow_dispatch always runs it too.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 10 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate full story (Hindi)
        env:
          KIDS_LANG:         hi
          KIDS_OUTPUT:       full
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Upload to Facebook Kids Page
        env:
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN_KIDS }}
          FACEBOOK_KIDS_PAGE_ID: ${{ secrets.FACEBOOK_KIDS_PAGE_ID }}
        run: python upload_facebook.py --meta-prefix kids

      - name: Save artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kids-full-debug-${{ github.run_id }}
          path: output/

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            "${{ github.workflow }} — Hindi Full"
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "Engineer will investigate. Live trade alerts unaffected.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF

  # ── Hindi Cliffhanger Short — RETIRED 2026-06-01 ──────────────────────────
  #   Dropped: it was just a 60-second crop of the full story = redundant.
  #   Kids channel now = Hindi full (India, native Hindi audio) + English full
  #   (global, native English audio) so BOTH audiences hear it in their own
  #   language (audio can't be auto-switched; captions can). To restore: re-add
  #   a `kids-hindi-short` job with KIDS_OUTPUT: short.

  # ── English Full Story (global reach) — added 2026-05-31 ──────────────────
  #   Native English HerooQuest episode for US/UK/global kids audiences. Runs in
  #   its own workspace, uploads to YouTube Kids (English title/desc + .srt).
  kids-english-full:
    # English cron only (19:00 UTC = US/UK after-school); workflow_dispatch always runs it too.
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate full story (English)
        env:
          KIDS_LANG:         en
          KIDS_OUTPUT:       full
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            "${{ github.workflow }} — English Full"
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "Engineer will investigate. Live trade alerts unaffected.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF

  # ── Hindi "Did You Know" short — RETIRED 2026-05-31 ────────────────────────
  #   Quality-over-quantity (owner decision): kids cut 3 → 2 videos/day.
  #   Kept = Full story (main watch-time + auto-translate .srt) + Cliffhanger
  #   short (Shorts-feed reach). The DYK short was the weakest/most redundant.
  #   To restore: re-add a `kids-hindi-dyk` job with KIDS_OUTPUT: didyouknow.
