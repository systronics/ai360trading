name: Kids Channel — Daily Video

# v2.1 FIXES (May 2026):
#   ADDED: KIDS_OUTPUT env var — was missing, only full story was generating
#          Now runs 3 separate jobs: full + short + didyouknow
#   FIXED: KIDS_LANG — 'both' is not valid for generate_kids_video.py
#          Now runs Hindi job separately (English when credentials added)
#   ADDED: YOUTUBE_CREDENTIALS_KIDS to all upload steps

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Language mode"
        required: false
        default: "hi"
        type: choice
        options:
          - hi
          - en
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST every day

jobs:

  # ── Hindi Full Story (~7.5 min) ──────────────────────────────────────────
  kids-hindi-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install Pillow edge-tts pytz google-genai huggingface-hub requests
          pip install anthropic openai groq google-api-python-client google-auth

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate full story (Hindi)
        env:
          KIDS_LANG:         hi
          KIDS_OUTPUT:       full
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_KIDS_PAGE_ID: ${{ secrets.FACEBOOK_KIDS_PAGE_ID }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Upload to Facebook Kids Page
        env:
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN_KIDS }}
          FACEBOOK_KIDS_PAGE_ID: ${{ secrets.FACEBOOK_KIDS_PAGE_ID }}
        run: python upload_facebook.py --meta-prefix kids

  # ── Hindi Cliffhanger Short ──────────────────────────────────────────────
  kids-hindi-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install Pillow edge-tts pytz google-genai huggingface-hub requests
          pip install anthropic openai groq google-api-python-client google-auth

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate cliffhanger short (Hindi)
        env:
          KIDS_LANG:         hi
          KIDS_OUTPUT:       short
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

  # ── Hindi Did You Know Short ─────────────────────────────────────────────
  kids-hindi-didyouknow:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install Pillow edge-tts pytz google-genai huggingface-hub requests
          pip install anthropic openai groq google-api-python-client google-auth

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate Did You Know short (Hindi)
        env:
          KIDS_LANG:         hi
          KIDS_OUTPUT:       didyouknow
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py
