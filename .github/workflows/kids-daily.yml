name: Kids Channel — Daily Video

# v2.2 (May 2026):
#   ADDED: Telegram failure notification to all 3 jobs
#
# v2.1 FIX (May 2026):
#   FIXED: KIDS_LANG='both' not handled → now defaults to 'hi'
#   FIXED: Single job → 3 separate jobs (full + short + DYK)
#   FIXED: Only 7 pip packages → now uses requirements.txt
#   FIXED: KIDS_OUTPUT was missing → only full story generated
#   ADDED: All 4 AI provider keys for fallback chain
#   ADDED: FACEBOOK_KIDS_PAGE_ID to generate step
#   NOTE: Instagram removed — manual upload from phone

on:
  workflow_dispatch:
    inputs:
      lang:
        description: "Language mode"
        required: false
        default: "hi"
        type: choice
        options:
          - hi
          - en
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST every day

jobs:

  # ── Hindi Full Story (~7.5 min) ────────────────────────────────────────────
  kids-hindi-full:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-liberation

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate full story (Hindi)
        env:
          KIDS_LANG:         hi
          KIDS_OUTPUT:       full
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Upload to Facebook Kids Page
        env:
          META_ACCESS_TOKEN:     ${{ secrets.META_ACCESS_TOKEN_KIDS }}
          FACEBOOK_KIDS_PAGE_ID: ${{ secrets.FACEBOOK_KIDS_PAGE_ID }}
        run: python upload_facebook.py --meta-prefix kids

      - name: Save artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kids-full-debug-${{ github.run_id }}
          path: output/

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            "${{ github.workflow }} — Hindi Full"
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "Engineer will investigate. Live trade alerts unaffected.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF

  # ── Hindi Cliffhanger Short ────────────────────────────────────────────────
  kids-hindi-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare workspace
        run: mkdir -p output

      - name: Generate cliffhanger short (Hindi)
        env:
          KIDS_LANG:         hi
          KIDS_OUTPUT:       short
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN:          ${{ secrets.HF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID_BASIC:      ${{ secrets.CHAT_ID_BASIC }}
          WF_NAME:            "${{ github.workflow }} — Cliffhanger Short"
          RUN_URL:            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          import os, json
          from urllib.request import Request, urlopen
          token = os.environ.get('TELEGRAM_BOT_TOKEN','')
          chat  = os.environ.get('CHAT_ID_BASIC','')
          if not token or not chat:
              print('[NOTIFY] Telegram creds missing — skip'); raise SystemExit(0)
          msg = (
              "⚠️ <b>System Notice — AI360Trading</b>\n\n"
              f"Workflow failed: <b>{os.environ.get('WF_NAME','?')}</b>\n"
              f"Run log: {os.environ.get('RUN_URL','')}\n\n"
              "<i>This is a system message, not a trade signal. "
              "Engineer will investigate. Live trade alerts unaffected.</i>"
          )
          try:
              req = Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=json.dumps({'chat_id':chat,'text':msg,'parse_mode':'HTML'}).encode(),
                  headers={'Content-Type':'application/json'},
              )
              urlopen(req, timeout=10).read()
              print('[NOTIFY] Failure alert sent to Basic channel')
          except Exception as e:
              print(f'[NOTIFY] Send failed: {e}')
          PYEOF

  # ── Hindi "Did You Know" short — RETIRED 2026-05-31 ────────────────────────
  #   Quality-over-quantity (owner decision): kids cut 3 → 2 videos/day.
  #   Kept = Full story (main watch-time + auto-translate .srt) + Cliffhanger
  #   short (Shorts-feed reach). The DYK short was the weakest/most redundant.
  #   To restore: re-add a `kids-hindi-dyk` job with KIDS_OUTPUT: didyouknow.
