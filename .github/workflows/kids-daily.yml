name: Kids Channel — Daily Video
on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install moviepy==1.0.3 imageio==2.9.0 Pillow>=10.3.0
          pip install edge-tts google-generativeai anthropic openai groq pytz
          pip install google-api-python-client google-auth

      - name: Generate kids video
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          KIDS_LANG:         ${{ inputs.lang || 'both' }}
        run: python generate_kids_video.py

      - name: Upload to YouTube Kids channel
        env:
          YOUTUBE_CREDENTIALS_KIDS: ${{ secrets.YOUTUBE_CREDENTIALS_KIDS }}
        run: python upload_kids_youtube.py

      - name: Upload to Facebook + Instagram
        env:
          META_ACCESS_TOKEN:    ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID:     ${{ secrets.FACEBOOK_KIDS_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_KIDS_ACCOUNT_ID }}
        run: |
          python upload_facebook.py --meta-prefix kids
          python upload_instagram.py --meta-prefix kids

      - name: Save artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: kids-debug-${{ github.run_id }}
          path: output/
