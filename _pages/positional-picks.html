<style>
  /* Standard Page Layout */
  .post-content, .wrapper {
    max-width: 1200px !important;
    margin: 0 auto !important;
    padding: 0 15px !important;
  }
  
  .trading-status {
    text-align: center;
    margin-bottom: 25px;
    padding: 30px;
    background: #f0f7ff;
    border-radius: 12px;
    border: 1px solid #d1d9e6;
  }

  .tab-navigation {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .tab-btn {
    padding: 12px 25px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    border: 2px solid #0088cc;
    background: white;
    color: #0088cc;
    border-radius: 50px;
    transition: 0.3s;
  }

  .tab-btn.active {
    background: #0088cc;
    color: white;
  }

  /* --- CRITICAL SCROLL FIXES --- */
  
  .terminal-box {
    position: relative;
    width: 100%;
    background: #fff;
    border: 1px solid #e1e8ed;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    
    /* Prevents the parent from expanding beyond the screen */
    overflow: hidden; 
  }

  .terminal-scroll-container {
    width: 100%;
    /* Forces horizontal scrollbar */
    overflow-x: auto !important; 
    overflow-y: hidden;
    
    /* Enable smooth momentum scrolling on iOS */
    -webkit-overflow-scrolling: touch !important; 
    
    /* Disables browser 'bounce' to prioritize the table slide */
    overscroll-behavior-x: contain; 
    
    /* Ensures the div is recognized as a scrollable layer */
    display: block; 
    position: relative;
  }

  iframe {
    /* Large min-width forces the scroll container to work */
    min-width: 1150px; 
    width: 100%;
    height: 800px;
    border: none;
    display: block;
    
    /* Prevents iframe from intercepting touch events poorly */
    pointer-events: auto; 
  }

  .scroll-hint {
    display: block;
    text-align: center;
    font-size: 13px;
    color: #0088cc;
    margin-bottom: 10px;
    font-weight: bold;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
  }

  @media (max-width: 768px) {
    iframe { height: 700px; }
    .tab-btn { padding: 10px 15px; font-size: 13px; }
  }
</style>

<div class="trading-status">
  <span style="display: inline-block; padding: 4px 12px; background: #0088cc; color: white; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px;">STRATEGY: INSTITUTIONAL RESEARCH</span>
  <h1 style="margin: 5px 0; color: #2c3e50; font-size: 24px;">Institutional Positional Picks</h1>
</div>

<div class="tab-navigation">
  <button class="tab-btn active" onclick="switchSheet(event, 'buy-view')">📈 BUY SIGNALS</button>
  <button class="tab-btn" id="sell-btn" onclick="switchSheet(event, 'sell-view')" style="border-color: #cc0000; color: #cc0000;">📉 SELL SIGNALS</button>
</div>

<!-- Animated Hint for Users -->
<p class="scroll-hint">↔️ SWIPE LEFT/RIGHT ON TABLE TO VIEW ALL COLUMNS</p>

<div class="terminal-box">
  <div id="buy-view" class="tab-content" style="display: block;">
    <div class="terminal-scroll-container">
      <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxCmYGRepK_DgUk-KMeudF4PoQ9B89msVkMeZmImFb-2QaXobqjOthwdMDlvxpHtu3S9UtyXo9SrOR/pubhtml?gid=1076123104&single=true&headers=false&widget=false"></iframe>
    </div>
  </div>

  <div id="sell-view" class="tab-content" style="display: none;">
    <div class="terminal-scroll-container">
      <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxCmYGRepK_DgUk-KMeudF4PoQ9B89msVkMeZmImFb-2QaXobqjOthwdMDlvxpHtu3S9UtyXo9SrOR/pubhtml?gid=8115561&single=true&headers=false&widget=false"></iframe>
    </div>
  </div>
</div>

<script>
function switchSheet(evt, tabId) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tab-content");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  tablinks = document.getElementsByClassName("tab-btn");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].classList.remove("active");
    tablinks[i].style.backgroundColor = "white";
    tablinks[i].style.color = tablinks[i].id === "sell-btn" ? "#cc0000" : "#0088cc";
  }
  document.getElementById(tabId).style.display = "block";
  evt.currentTarget.classList.add("active");
  evt.currentTarget.style.backgroundColor = evt.currentTarget.id === "sell-btn" ? "#cc0000" : "#0088cc";
  evt.currentTarget.style.color = "white";
}
</script>
